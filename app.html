/* ----------------------------------------------------------------
   CALENDAR
   ---------------------------------------------------------------- */
function renderCalendar() {
  if (!state.ui.calendarMonth) {
    state.ui.calendarMonth = today().slice(0, 7);
  }
  const [year, month] = state.ui.calendarMonth.split("-").map(Number);
  const first = new Date(year, month - 1, 1);
  const last = new Date(year, month, 0);
  const startWeekday = (first.getDay() + 6) % 7; // Mon=0

  const cells = [];
  // leading blanks (previous month)
  for (let i = startWeekday - 1; i >= 0; i--) {
    const d = new Date(year, month - 1, -i);
    cells.push({ date: d, otherMonth: true });
  }
  // this month
  for (let d = 1; d <= last.getDate(); d++) {
    cells.push({ date: new Date(year, month - 1, d), otherMonth: false });
  }
  // trailing blanks
  while (cells.length % 7 !== 0) {
    const d = new Date(cells[cells.length - 1].date);
    d.setDate(d.getDate() + 1);
    cells.push({ date: d, otherMonth: true });
  }
  // make sure we have 6 rows for layout stability (optional)
  while (cells.length < 42) {
    const d = new Date(cells[cells.length - 1].date);
    d.setDate(d.getDate() + 1);
    cells.push({ date: d, otherMonth: true });
  }

  const grid = el("div", { class: "cal-grid" });
  cells.forEach(cell => {
    const iso = localISO(cell.date);
    const dayPayouts = state.payouts.filter(p => p.date === iso);
    const cls = ["cal-day"];
    if (cell.otherMonth) cls.push("other-month");
    if (iso === today()) cls.push("today");

    // Decide which "primary" amount to show:
    //   received total if any received, else pending total, else denied total
    const receivedPays  = dayPayouts.filter(p => p.status === "received");
    const pendingPays   = dayPayouts.filter(p => p.status === "awaiting_approval");
    const deniedPays    = dayPayouts.filter(p => p.status === "denied");

    let amount = 0, amountClass = "";
    if (receivedPays.length) {
      amount = receivedPays.reduce((s, p) => s + Number(p.amount), 0);
      amountClass = "received";
      cls.push("has-received");
    } else if (pendingPays.length) {
      amount = pendingPays.reduce((s, p) => s + Number(p.amount), 0);
      amountClass = "pending";
      cls.push("has-pending");
    } else if (deniedPays.length) {
      amount = deniedPays.reduce((s, p) => s + Number(p.amount), 0);
      amountClass = "denied";
    }

    // Status dots (one per distinct status)
    const dots = el("div", { class: "cal-dots" });
    const seen = new Set();
    dayPayouts.forEach(p => {
      if (seen.has(p.status)) return;
      seen.add(p.status);
      dots.appendChild(el("div", { class: "cal-dot " + p.status }));
    });

    const amountEl = el("div", { class: "cal-day-amount " + amountClass },
      amount > 0 ? compactGBP(amount) : ""
    );

    const dayEl = el("button", {
      class: cls.join(" "),
      onclick: () => { if (!cell.otherMonth) openDaySheet(iso); }
    },
      el("div", { class: "cal-day-num" }, cell.date.getDate().toString()),
      amountEl,
      el("div", { class: "cal-dots" },
        ...Array.from(dots.children),
        journalForDate(iso) ? el("div", { class: "cal-dot", style: "background:var(--lav-1);opacity:0.7;" }) : null
      )
    );
    grid.appendChild(dayEl);
  });

  return el("section", { class: "section" },
    el("div", { class: "card" },
      el("div", { class: "card-header" },
        el("div", { class: "card-title" }, "Payout Calendar"),
        el("div", { class: "cal-nav" },
          el("button", { class: "cal-nav-btn", onclick: () => { shiftMonth(-1); rerender(); } }, svgIcon("chevL")),
          el("button", { class: "cal-nav-btn", onclick: () => { state.ui.calendarMonth = today().slice(0, 7); saveState(); rerender(); } },
            el("span", { style: "font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;" }, "Today")),
          el("button", { class: "cal-nav-btn", onclick: () => { shiftMonth(1); rerender(); } }, svgIcon("chevR"))
        )
      ),
      el("div", { class: "cal-month" }, first.toLocaleDateString("en-GB", { month: "long", year: "numeric" })),
      el("div", { class: "cal-weekdays" },
        ...["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d => el("span", {}, d))
      ),
      grid,
      el("div", { class: "cal-legend" },
        el("div", { class: "cal-legend-item" }, el("span", { class: "cal-legend-dot", style: "background:var(--jade-1);" }), "Received"),
        el("div", { class: "cal-legend-item" }, el("span", { class: "cal-legend-dot", style: "background:var(--amber-1);" }), "Awaiting"),
        el("div", { class: "cal-legend-item" }, el("span", { class: "cal-legend-dot", style: "background:var(--rose-1);" }), "Denied"),
        el("div", { class: "cal-legend-item" }, el("span", { class: "cal-legend-dot", style: "background:var(--lav-1);opacity:0.7;" }), "Note")
      )
    )
  );
}

function shiftMonth(delta) {
  const [y, m] = state.ui.calendarMonth.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  state.ui.calendarMonth = localMonthISO(d);
  saveState();
}

function renderProjected() {
  const proj = projectedAnnualIncome();
  const series = monthlyEarningsSeries(3);
  const avg3 = series.reduce((s, d) => s + d.total, 0) / series.length;
  const velocity = payoutVelocity();
  const velClass = velocity > 0 ? "up" : velocity < 0 ? "down" : "flat";
  const velText  = velocity > 0 ? `↑ ${velocity}% vs prior 30d` : velocity < 0 ? `↓ ${Math.abs(velocity)}% vs prior 30d` : "Steady vs prior 30d";

  return el("section", { class: "section" },
    el("div", { class: "card" },

        ),

  );
}

function renderLeaderboard() {
  const board = firmLeaderboard();
  if (!board.length) return el("div", {});

  const rankLabels = ["gold", "silver", "bronze"];
  const rows = board.map((entry, i) => {
    const drClass = entry.denialRate === null ? "" : entry.denialRate <= 10 ? "low" : entry.denialRate <= 30 ? "mid" : "high";
    const drText  = entry.denialRate === null ? "—" : `${entry.denialRate}% denied`;

    return el("div", { class: "lb-row" },
      el("div", { class: `lb-rank ${rankLabels[i] || ""}` }, i < 3 ? ["🥇","🥈","🥉"][i] : `${i + 1}`),
      el("div", {
        class: "pay-avatar",
        style: `background:${firmAvatar(entry.firm)};width:32px;height:32px;font-size:11px;flex-shrink:0;`
      }, firmInitials(entry.firm.name)),
      el("div", { class: "lb-info" },

        el("div", { class: "lb-meta" }, `${entry.count} payout${entry.count === 1 ? "" : "s"}`)

      entry.denialRate !== null
        ? el("div", { class: `lb-denial ${drClass}` }, drText)

      el("div", { class: "lb-total num" }, entry.total > 0 ? fmtGBP(entry.total, { short: entry.total >= 1000 }) : "—")

        el("div", { class: "card-title" }, "Firm Leaderboard"),

  app.appendChild(renderTop());

  if (!state.profile.onboarded && state.payouts.length === 0 && state.firms.length === 0) {
    app.appendChild(renderWelcome());
    app.appendChild(renderHero());
    app.appendChild(renderRings());
    app.appendChild(renderFirms());
    return;
  }

  // Add page-enter animation wrapper
  const content = document.createElement("div");
  content.className = "page-enter";

  // Dispatch to the correct page renderer
  const pageApp = { appendChild: (el) => app.appendChild(el) };
  switch (currentPage) {
    case "dashboard": renderPageDashboard(pageApp); break;
    case "payouts":   renderPagePayouts(pageApp);   break;
    case "finance":   renderPageFinance(pageApp);   break;
    case "firms":     renderPageFirms(pageApp);     break;
    case "calendar":  renderPageCalendar(pageApp);  break;
    case "stats":     renderPageStats(pageApp);     break;
    case "settings":  renderPageSettings(pageApp);  break;
    default:          renderPageDashboard(pageApp);
  }

  // Trigger animations on next frame
  requestAnimationFrame(() => {
    document.querySelectorAll(".goal-bar-fill[data-target-width]").forEach(f => {
      f.style.width = f.getAttribute("data-target-width") + "%";
    });
    document.querySelectorAll(".bc-bar[data-target-height]").forEach(b => {
      b.style.height = b.getAttribute("data-target-height") + "%";
    });
  });
}

function rerender() {
  // Light re-render that doesn't restart hero animations
  render();
}

/* ================================================================
   NUMBER COUNT-UP
   ================================================================ */
function animateNumber(node) {
  if (node.dataset.animated === "1") return;
  node.dataset.animated = "1";
  const target = parseFloat(node.dataset.count);
  if (isNaN(target)) return;

  // We don't animate the whole hero amount text directly because of the £/pence split;
  // instead just leave it static — animations of just the percentage looks cleaner.
  if (!node.classList.contains("ring-percent")) return;

  const duration = 1100;
  const start = performance.now();
  const ease = (t) => 1 - Math.pow(1 - t, 3);
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    const v = target * ease(t);
    node.textContent = Math.round(v) + "%";
    if (t < 1) requestAnimationFrame(step);
    else node.textContent = Math.round(target) + "%";
  }
  node.textContent = "0%";
  requestAnimationFrame(step);
}

/* ================================================================
   SHEETS / MODALS
   ================================================================ */
const scrim = document.getElementById("scrim");
const sheet = document.getElementById("sheet");
const sheetContent = document.getElementById("sheetContent");

function openSheet(contentBuilder) {
  sheetContent.innerHTML = "";
  sheetContent.appendChild(contentBuilder());
  scrim.classList.add("open");
  // small delay so animation triggers cleanly
  requestAnimationFrame(() => sheet.classList.add("open"));
  document.body.style.overflow = "hidden";
}
function closeSheet() {
  sheet.classList.remove("open");
  scrim.classList.remove("open");
  document.body.style.overflow = "";
}
scrim.addEventListener("click", closeSheet);
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeSheet(); });

function sheetHead(title, onClose) {
  return el("div", { class: "sheet-head" },
    el("div", { class: "sheet-title" }, title),
    el("button", { class: "sheet-close", onclick: onClose || closeSheet }, svgIcon("close"))
  );
}

/* ----------------------------------------------------------------
   PAYOUT SHEET
   ---------------------------------------------------------------- */
function openPayoutSheet(payoutId, opts = {}) {
  const editing = payoutId ? state.payouts.find(p => p.id === payoutId) : null;
  if (!editing && _tier === "free" && state.payouts.length >= FREE_PAYOUTS) {
    showUpgradePrompt("More than " + FREE_PAYOUTS + " payouts");
    return;
  }

  // For new payouts, default to the first firm that has at least one account,
  // so the user lands on a workable state instead of immediately hitting the empty-account prompt.
  let defaultFirmId = state.firms[0]?.id || "";
  if (!editing) {
    const firmWithAccounts = state.firms.find(f => accountsForFirm(f.id).length > 0);
    if (firmWithAccounts) defaultFirmId = firmWithAccounts.id;
  }

  // opts.prefill is used by the Duplicate action — seeds a new draft with copied values
  const prefill = opts.prefill || null;

  const draft = editing ? { ...editing } : prefill ? { ...prefill } : {
    id: uid(),
    firmId: defaultFirmId,
    accountId: "",
    amount: "",
    date: opts.date || today(),
    status: "awaiting_approval",
    notes: ""
  };
  // Auto-select the first account of the chosen firm if none picked yet
  if (!editing && draft.firmId && !draft.accountId) {
    const accts = accountsForFirm(draft.firmId);
    if (accts.length) draft.accountId = accts[0].id;
  }

  openSheet(() => {
    const root = document.createElement("div");
    root.appendChild(sheetHead(editing ? "Edit Payout" : "Add Payout"));

    const body = el("div", { class: "sheet-body" });

    // If no firms yet, force the user to add one first
    if (!state.firms.length) {
      body.appendChild(el("div", { class: "empty", style: "padding:14px 0;" },
        el("div", { class: "empty-icon" }, "🏛"),
        el("div", { class: "empty-title" }, "Add a firm first"),
        el("div", { class: "empty-text" }, "Payouts are linked to firms — let's add one so we can attribute this payout correctly."),
        el("button", { class: "empty-btn", onclick: () => { closeSheet(); setTimeout(() => openFirmSheet(), 200); } }, "Add firm")
      ));
      root.appendChild(body);
      return root;
    }

    // Firm
    const firmSel = el("select", { class: "select" },
      ...state.firms.map(f => {
        const opt = document.createElement("option");
        opt.value = f.id;
        opt.textContent = f.name;
        if (draft.firmId === f.id) opt.selected = true;
        return opt;
      })
    );
    firmSel.addEventListener("change", () => {
      draft.firmId = firmSel.value;
      draft.accountId = "";
      refreshAccountSel();
    });

    // Account (filtered by firm) — REQUIRED. If firm has no accounts, show an inline prompt.
    const accountWrap = el("div", { class: "field" });
    function refreshAccountSel() {
      accountWrap.innerHTML = "";
      const accts = accountsForFirm(draft.firmId);
      accountWrap.appendChild(el("label", { class: "field-label" }, "Account"));

      if (!accts.length) {
        // Inline empty-state with a single-tap "Add account" path
        accountWrap.appendChild(el("div", { class: "inline-warn" },
          el("div", { class: "inline-warn-text" },
            el("strong", {}, "No accounts under this firm yet."),
            el("div", { style: "margin-top:3px;font-weight:400;opacity:0.85;" }, "Each payout has to be tied to an account.")
          ),
          el("button", {
            class: "inline-warn-btn",
            type: "button",
            onclick: () => {
              const firmIdForAccount = draft.firmId;
              closeSheet();
              // After the account is added, the user can come back and add the payout.
              setTimeout(() => openAccountSheet(null, firmIdForAccount), 200);
            }
          }, "Add account")
        ));
        return;
      }

      // Make sure the draft account belongs to this firm; if not, pick the first one
      if (!draft.accountId || !accts.find(a => a.id === draft.accountId)) {
        draft.accountId = accts[0].id;
      }

      const sel = el("select", { class: "select" });
      accts.forEach(a => {
        const o = document.createElement("option");
        o.value = a.id;
        o.textContent = `${a.label} · ${healthLabel(a.health)}`;
        if (draft.accountId === a.id) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener("change", () => draft.accountId = sel.value);
      accountWrap.appendChild(sel);
    }
    refreshAccountSel();

    // Amount + Date
    const amountWrap = el("div", { class: "input-prefix-wrap" },
      el("span", { class: "prefix" }, "£"),
      el("input", {
        class: "input num", type: "number", inputmode: "decimal", step: "0.01", min: "0",
        placeholder: "0.00",
        value: draft.amount,
        oninput: (e) => draft.amount = e.target.value
      })
    );

    const dateInput = el("input", {
      class: "input", type: "date", value: draft.date,
      oninput: (e) => draft.date = e.target.value
    });

    // Status chips
    const statusRow = el("div", { class: "chip-row" });
    function rebuildStatusChips() {
      statusRow.innerHTML = "";
      PAYOUT_STATUSES.forEach(s => {
        const c = el("button", {
          class: "chip" + (draft.status === s.id ? " active" : ""),
          type: "button",
          onclick: () => { draft.status = s.id; rebuildStatusChips(); }
        }, s.label);
        statusRow.appendChild(c);
      });
    }
    rebuildStatusChips();

    body.appendChild(el("div", { class: "field" },
      el("label", { class: "field-label" }, "Firm"),
      firmSel
    ));
    body.appendChild(accountWrap);
    body.appendChild(el("div", { class: "field-row" },
      el("div", { class: "field" },
        el("label", { class: "field-label" }, "Amount (GBP)"),
        amountWrap
      ),
      el("div", { class: "field" },
        el("label", { class: "field-label" }, "Date"),
        dateInput
      )
    ));
    body.appendChild(el("div", { class: "field" },
      el("label", { class: "field-label" }, "Status"),
      statusRow
    ));
    body.appendChild(el("div", { class: "field" },
      el("label", { class: "field-label" }, "Notes (optional)"),
      el("textarea", {
        class: "textarea",
        placeholder: "Reason for delay, batch number, anything useful…",
        oninput: (e) => draft.notes = e.target.value
      }, draft.notes || "")
    ));
    root.appendChild(body);

    // Footer
    const foot = el("div", { class: "sheet-foot" });
    if (editing) {
      foot.appendChild(el("button", { class: "btn danger", onclick: () => {
        if (confirm("Delete this payout? This can't be undone.")) {
          state.payouts = state.payouts.filter(p => p.id !== editing.id);
          saveState();
          closeSheet();
          rerender();
          toast("Payout deleted");
        }
      } }, "Delete"));
      // Duplicate — copies the payout with a new id, pre-set to today, re-opens the sheet
      foot.appendChild(el("button", { class: "btn-duplicate", onclick: () => {
        closeSheet();
        setTimeout(() => openPayoutSheet(null, {
          prefill: { ...editing, id: uid(), date: today(), status: "awaiting_approval" }
        }), 200);
      } }, "⎘ Duplicate"));
    }
    foot.appendChild(el("button", { class: "btn ghost", onclick: closeSheet }, "Cancel"));
    foot.appendChild(el("button", { class: "btn primary", onclick: () => {
      const amount = parseFloat(draft.amount);
      if (!draft.firmId) return toast("Pick a firm");
      if (!draft.accountId) return toast("Pick an account for this payout");
      if (isNaN(amount) || amount < 0) return toast("Enter a valid amount");
      if (!draft.date) return toast("Pick a date");

      const final = { ...draft, amount };
      if (editing) {
        state.payouts = state.payouts.map(p => p.id === editing.id ? final : p);
      } else {
        state.payouts.push(final);
      }
      saveState();
      closeSheet();
      rerender();
      toast(editing ? "Payout updated" : "Payout added");
    } }, editing ? "Save" : "Add payout"));
    root.appendChild(foot);

    return root;
  });
}

/* ----------------------------------------------------------------
   FIRM SHEET
   ---------------------------------------------------------------- */
function openFirmSheet(firmId) {
  const editing = firmId ? getFirm(firmId) : null;
  if (!editing && _tier === "free" && state.firms.length >= FREE_FIRMS) {
    showUpgradePrompt("More than " + FREE_FIRMS + " firms");
    return;
  }
  const draft = editing ? { ...editing } : { id: uid(), name: "" };

  openSheet(() => {
    const root = document.createElement("div");
    root.appendChild(sheetHead(editing ? "Edit Firm" : "Add Firm"));

    const body = el("div", { class: "sheet-body" });

    // Firm picker: dropdown of popular firms + "Other (custom name)" option that reveals a text input.
    // If editing a firm whose name isn't in the popular list, "Other" is pre-selected and the input is pre-filled.
    const isPopular = POPULAR_FIRMS.includes(draft.name);
    const startsCustom = !!draft.name && !isPopular;

    const firmSelect = el("select", { class: "select" });
    const placeholderOpt = document.createElement("option");
    placeholderOpt.value = ""; placeholderOpt.textContent = "Select a firm…";
    firmSelect.appendChild(placeholderOpt);
    POPULAR_FIRMS.forEach(name => {
      const o = document.createElement("option");
      o.value = name; o.textContent = name;
      if (draft.name === name) o.selected = true;
      firmSelect.appendChild(o);
    });
    const otherOpt = document.createElement("option");
    otherOpt.value = "__custom__"; otherOpt.textContent = "Other (enter your own)…";
    if (startsCustom) otherOpt.selected = true;
    firmSelect.appendChild(otherOpt);

    const customWrap = el("div", { style: "margin-top:8px; display:" + (startsCustom ? "block" : "none") + ";" },
      el("input", {
        class: "input", type: "text", placeholder: "Enter firm name",
        value: startsCustom ? draft.name : "",
        oninput: (e) => { draft.name = e.target.value; }
      })
    );

    firmSelect.addEventListener("change", () => {
      if (firmSelect.value === "__custom__") {
        customWrap.style.display = "block";
        const input = customWrap.querySelector("input");
        draft.name = input.value;
        setTimeout(() => input.focus(), 50);
      } else {
        customWrap.style.display = "none";
        draft.name = firmSelect.value;
      }
    });

    body.appendChild(el("div", { class: "field" },
      el("label", { class: "field-label" }, "Firm"),
      firmSelect,
      customWrap
    ));

    // Accounts management inside firm sheet (when editing).
    // Account-level health is shown via each chip's color — firms themselves no longer have a health badge.
    if (editing) {
      const accts = accountsForFirm(editing.id);
      const acctSection = el("div", { class: "field" },
        el("label", { class: "field-label" }, `Accounts (${accts.length})`),
        el("div", { class: "firm-accounts", style: "margin-top:0;" },
          ...accts.map(a => el("button", {
            class: "account-chip " + a.health,
            onclick: () => { closeSheet(); setTimeout(() => openAccountSheet(a.id), 200); }
          },
            el("span", { class: "dot" }),
            a.label,
            el("span", { style: "color:var(--text-2);margin-left:5px;font-size:10px;font-weight:500;" }, healthLabel(a.health))
          )),
          el("button", {
            class: "account-chip add",
            onclick: () => { closeSheet(); setTimeout(() => openAccountSheet(null, editing.id), 200); }
          }, "+ Account")
        )
      );
      body.appendChild(acctSection);
    }

    root.appendChild(body);

    const foot = el("div", { class: "sheet-foot" });
    if (editing) {
      foot.appendChild(el("button", { class: "btn danger", onclick: () => {
        const accts = accountsForFirm(editing.id).length;
        const pays = payoutsForFirm(editing.id).length;
        let msg = `Delete "${editing.name}"?`;
        if (accts || pays) msg += `\n\nThis will also remove ${accts} account${accts === 1 ? "" : "s"} and ${pays} payout${pays === 1 ? "" : "s"}.`;
        if (confirm(msg)) {
          state.firms = state.firms.filter(f => f.id !== editing.id);
          state.accounts = state.accounts.filter(a => a.firmId !== editing.id);
          state.payouts = state.payouts.filter(p => p.firmId !== editing.id);
          saveState();
          closeSheet();
          rerender();
          toast("Firm deleted");
        }
      } }, "Delete"));
    }
    foot.appendChild(el("button", { class: "btn ghost", onclick: closeSheet }, "Cancel"));
    foot.appendChild(el("button", { class: "btn primary", onclick: () => {
      const name = (draft.name || "").trim();
      if (!name) return toast("Pick or enter a firm name");
      // Prevent duplicate firms by name (case-insensitive), except when editing the same firm
      const dupe = state.firms.find(f => f.name.toLowerCase() === name.toLowerCase() && (!editing || f.id !== editing.id));
      if (dupe) return toast(`"${name}" is already in your roster`);
      const final = { id: draft.id, name };
      if (editing) {
        state.firms = state.firms.map(f => f.id === editing.id ? final : f);
      } else {
        state.firms.push(final);
      }
      saveState();
      closeSheet();
      rerender();
      toast(editing ? "Firm updated" : "Firm added");
    } }, editing ? "Save" : "Add firm"));
    root.appendChild(foot);

    return root;
  });
}

    root.appendChild(body);

    const foot = el("div", { class: "sheet-foot" });
    if (editing) {
      foot.appendChild(el("button", { class: "btn danger", onclick: () => {
        if (confirm("Delete this cost? This can't be undone.")) {
          state.spending = state.spending.filter(s => s.id !== editing.id);
          saveState();
          closeSheet();
          rerender();
          toast("Cost deleted");
        }
      } }, "Delete"));
    }
    foot.appendChild(el("button", { class: "btn ghost", onclick: closeSheet }, "Cancel"));
    foot.appendChild(el("button", { class: "btn primary", onclick: () => {
      const amount = parseFloat(draft.amount);
      if (isNaN(amount) || amount <= 0) return toast("Enter a valid amount");
      if (!draft.date) return toast("Pick a date");
      const final = { ...draft, amount };
      if (editing) {
        state.spending = state.spending.map(s => s.id === editing.id ? final : s);
      } else {
        state.spending.push(final);
      }
      saveState();
      closeSheet();
      rerender();
      toast(editing ? "Cost updated" : "Cost added");
    } }, editing ? "Save" : "Add cost"));
    root.appendChild(foot);

    return root;
  });
}

function openDaySheet(iso) {
  const dayPayouts = state.payouts.filter(p => p.date === iso);
  const journalEntry = journalForDate(iso);
  const isToday = iso === today();
  const isPast = iso < today();

  openSheet(() => {
    const root = document.createElement("div");
    root.appendChild(sheetHead(fmtDateLong(iso)));
    const body = el("div", { class: "sheet-body" });

    // ---- Quick-add payout button at the top ----
    body.appendChild(el("button", {
      class: "btn primary",
      style: "width:100%;margin-bottom:18px;",
      onclick: () => {
        closeSheet();
        setTimeout(() => openPayoutSheet(null, { date: iso }), 200);
      }
    }, "+ Add Payout for This Day"));

    // ---- Payouts for this day ----
    if (dayPayouts.length) {
      body.appendChild(el("div", { class: "field-label", style: "margin-bottom:8px;" }, `Payouts (${dayPayouts.length})`));
      const list = el("div", { class: "timeline", style: "margin-bottom:18px;" });
      dayPayouts.forEach(p => list.appendChild(payoutItem(p)));
      body.appendChild(list);
    }

    // ---- Journal / daily note ----
    body.appendChild(el("div", { class: "journal-wrap" },
      el("div", { class: "journal-label" },
        "Daily Note",
        journalEntry ? el("span", { class: "journal-dot" }) : null
      ),
      (() => {
        const ta = el("textarea", {
          class: "journal-textarea",
          placeholder: isToday
            ? "What happened today? Passed eval, got reset, market notes…"
            : isPast
            ? "Add a note about this day…"
            : "Notes for this upcoming date…"
        });
        ta.value = journalEntry ? journalEntry.text : "";

        let journalTimer = null;
        ta.addEventListener("input", () => {
          clearTimeout(journalTimer);
          journalTimer = setTimeout(() => {
            saveJournalEntry(iso, ta.value);
          }, 800); // auto-save after 800ms pause
        });

        return ta;
      })(),
      el("div", { style: "font-size:11px;color:var(--text-4);margin-top:6px;" }, "Auto-saves as you type")
    ));

    root.appendChild(body);

    const foot = el("div", { class: "sheet-foot" });
    foot.appendChild(el("button", { class: "btn ghost", onclick: closeSheet }, "Done"));
    root.appendChild(foot);

    return root;
  });
}

   ================================================================ */
function exportData() {
  if (_tier === "free") { showUpgradePrompt("Data export"); return; }
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `ledger-backup-${todayISO()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast("Exported");
}

function importData() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "application/json";
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!parsed.profile || !Array.isArray(parsed.firms)) throw new Error("Invalid file");

      const safeStr  = v => (typeof v === "string" ? v.slice(0, 500) : "");
      const safeNum  = v => { const n = Number(v); return Number.isFinite(n) && n >= 0 ? n : 0; };
      const safeDate = v => /^\d{4}-\d{2}-\d{2}$/.test(v) ? v : today();
      const safeId   = v => (typeof v === "string" && /^[\w-]{1,64}$/.test(v) ? v : uid());

      const sanitisedFirms = (parsed.firms || []).map(f => ({
        id: safeId(f.id), name: safeStr(f.name)
      }));
      const sanitisedAccounts = (parsed.accounts || []).map(a => ({
        id: safeId(a.id), firmId: safeStr(a.firmId), label: safeStr(a.label), health: safeStr(a.health)
      }));
      const sanitisedPayouts = (parsed.payouts || []).map(p => ({
        id: safeId(p.id), firmId: safeStr(p.firmId), accountId: safeStr(p.accountId),
        amount: safeNum(p.amount), date: safeDate(p.date), status: safeStr(p.status), notes: safeStr(p.notes)
      }));
      const sanitisedSpending = (parsed.spending || []).map(s => ({
        id: safeId(s.id), firmId: safeStr(s.firmId), accountId: safeStr(s.accountId),
        amount: safeNum(s.amount), date: safeDate(s.date), category: safeStr(s.category), notes: safeStr(s.notes)
      }));

      if (confirm("Replace your current data with the imported file? This can't be undone.")) {
        const p = parsed.profile || {};
        const g = p.goals || {};
        state = {
          profile: {
            ...DEFAULT_STATE.profile,
            name: safeStr(p.name),
            onboarded: !!p.onboarded,
            goals: {
              daily:   safeNum(g.daily)   || DEFAULT_STATE.profile.goals.daily,
              weekly:  safeNum(g.weekly)  || DEFAULT_STATE.profile.goals.weekly,
              monthly: safeNum(g.monthly) || DEFAULT_STATE.profile.goals.monthly,
              annual:  safeNum(g.annual)  || DEFAULT_STATE.profile.goals.annual,
            }
          },
          firms:    sanitisedFirms,
          accounts: sanitisedAccounts,
          payouts:  sanitisedPayouts,
          spending: sanitisedSpending,
          ui: { ...DEFAULT_STATE.ui }
        };
        saveState();
        closeSheet();
        rerender();
        toast("Imported successfully");
      }
    } catch (err) {
      toast("Couldn't import — invalid file");
    }
  };
  input.click();
}

let toastTimer = null;
function toast(msg) {
  const t = document.getElementById("toast");
  t.innerHTML = `<span class="check">✓</span>${msg}`;
  t.classList.add("visible");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("visible"), 2200);
}

/* ================================================================
   AUTHENTICATION — Supabase
   ================================================================ */

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
}

function getSession() {
  // Returns the cached user object synchronously (set by onAuthStateChange).
  return _currentUser ? { userId: _currentUser.id, email: _currentUser.email, name: _currentUser.user_metadata?.name || "" } : null;
}
function isLoggedIn() { return !!_currentUser; }

let authView = "login"; // "login" | "register" | "forgot"

function showAuthScreen() {
  const screen = document.getElementById("authScreen");
  screen.style.display = "flex";
  renderAuthView();
}
function hideAuthScreen() {
  document.getElementById("authScreen").style.display = "none";
}

function renderAuthView() {
  const screen = document.getElementById("authScreen");
  screen.innerHTML = "";
  const card = document.createElement("div");
  card.className = "auth-card";
  const brand = document.createElement("div");
  brand.className = "auth-brand";
  brand.innerHTML = `<div class="auth-brand-mark"></div><div class="auth-brand-name">Ledger</div>`;
  card.appendChild(brand);
  if (authView === "login")    card.appendChild(buildLoginForm());
  if (authView === "register") card.appendChild(buildRegisterForm());
  if (authView === "forgot")   card.appendChild(buildForgotForm());
  screen.appendChild(card);
}

function buildLoginForm() {
  const wrap = document.createElement("div");
  const title = document.createElement("div");
  title.className = "auth-title"; title.textContent = "Welcome back";
  const sub = document.createElement("div");
  sub.className = "auth-sub"; sub.textContent = "Log in to access your payouts";
  wrap.appendChild(title); wrap.appendChild(sub);

  const emailField = authField("Email", "email", "you@example.com");
  const pwField    = authField("Password", "password", "••••••••");
  const errEl      = document.createElement("div");
  errEl.className  = "auth-error";
  wrap.appendChild(emailField.wrap);
  wrap.appendChild(pwField.wrap);
  wrap.appendChild(errEl);

  const submit = document.createElement("button");
  submit.className = "auth-submit";
  submit.textContent = "Log In";
  submit.addEventListener("click", async () => {
    const email = emailField.input.value.trim();
    const pw    = pwField.input.value;
    errEl.textContent = "";
    if (!email || !pw) { errEl.textContent = "Enter your email and password."; return; }
    submit.disabled = true; submit.textContent = "Logging in…";
    const { error } = await supabase.auth.signInWithPassword({ email, password: pw });
    if (error) {
      errEl.textContent = error.message === "Invalid login credentials"
        ? "Incorrect email or password." : error.message;
      submit.disabled = false; submit.textContent = "Log In";
    }
    // onAuthStateChange fires automatically on success → onAuthSuccess()
  });
  wrap.appendChild(submit);

  const forgotLink = document.createElement("div");
  forgotLink.className = "auth-switch";
  forgotLink.innerHTML = `<a id="toForgot">Forgot your password?</a>`;
  wrap.appendChild(forgotLink);

  const switchLink = document.createElement("div");
  switchLink.className = "auth-switch";
  switchLink.innerHTML = `Don't have an account? <a id="toRegister">Sign up</a>`;
  wrap.appendChild(switchLink);

  wrap.querySelector("#toForgot").addEventListener("click", () => { authView = "forgot"; renderAuthView(); });
  wrap.querySelector("#toRegister").addEventListener("click", () => { authView = "register"; renderAuthView(); });
  [emailField.input, pwField.input].forEach(inp => {
    inp.addEventListener("keydown", e => { if (e.key === "Enter") submit.click(); });
  });
  return wrap;
}

function buildRegisterForm() {
  const wrap = document.createElement("div");
  const title = document.createElement("div");
  title.className = "auth-title"; title.textContent = "Create your account";
  const sub = document.createElement("div");
  sub.className = "auth-sub"; sub.textContent = "Start tracking your payouts";
  wrap.appendChild(title); wrap.appendChild(sub);

  const nameField  = authField("Name", "text", "Your name");
  const emailField = authField("Email", "email", "you@example.com");
  const pwField    = authField("Password", "password", "At least 6 characters");
  const pw2Field   = authField("Confirm Password", "password", "Re-enter your password");
  const errEl      = document.createElement("div");
  errEl.className  = "auth-error";
  wrap.appendChild(nameField.wrap);
  wrap.appendChild(emailField.wrap);
  wrap.appendChild(pwField.wrap);
  wrap.appendChild(pw2Field.wrap);
  wrap.appendChild(errEl);

  const submit = document.createElement("button");
  submit.className = "auth-submit";
  submit.textContent = "Sign Up";
  submit.addEventListener("click", async () => {
    const name  = nameField.input.value.trim();
    const email = emailField.input.value.trim();
    const pw    = pwField.input.value;
    const pw2   = pw2Field.input.value;
    errEl.textContent = "";
    if (!name)                  { errEl.textContent = "Tell us your name."; return; }
    if (!isValidEmail(email))   { errEl.textContent = "Enter a valid email address."; return; }
    if (pw.length < 6)          { errEl.textContent = "Password must be at least 6 characters."; return; }
    if (pw !== pw2)             { errEl.textContent = "Passwords don't match."; return; }
    submit.disabled = true; submit.textContent = "Creating account…";
    const { error } = await supabase.auth.signUp({
      email,
      password: pw,
      options: { data: { name } }
    });
    if (error) {
      errEl.textContent = error.message;
      submit.disabled = false; submit.textContent = "Sign Up";
    }
    // onAuthStateChange fires on success → onAuthSuccess()
  });
  wrap.appendChild(submit);

  const switchLink = document.createElement("div");
  switchLink.className = "auth-switch";
  switchLink.innerHTML = `Already have an account? <a id="toLogin">Log in</a>`;
  wrap.appendChild(switchLink);
  wrap.querySelector("#toLogin").addEventListener("click", () => { authView = "login"; renderAuthView(); });
  [nameField.input, emailField.input, pwField.input, pw2Field.input].forEach(inp => {
    inp.addEventListener("keydown", e => { if (e.key === "Enter") submit.click(); });
  });
  return wrap;
}

function buildForgotForm() {
  const wrap = document.createElement("div");
  const back = document.createElement("div");
  back.className = "auth-back";
  back.innerHTML = `← Back to login`;
  back.addEventListener("click", () => { authView = "login"; renderAuthView(); });
  wrap.appendChild(back);

  const title = document.createElement("div");
  title.className = "auth-title"; title.textContent = "Reset your password";
  const sub = document.createElement("div");
  sub.className = "auth-sub"; sub.textContent = "We'll send a reset link to your email";
  wrap.appendChild(title); wrap.appendChild(sub);

  const emailField = authField("Email", "email", "you@example.com");
  const msgEl      = document.createElement("div");
  msgEl.className  = "auth-error";
  wrap.appendChild(emailField.wrap);
  wrap.appendChild(msgEl);

  const submit = document.createElement("button");
  submit.className = "auth-submit";
  submit.textContent = "Send Reset Link";
  submit.addEventListener("click", async () => {
    const email = emailField.input.value.trim();
    if (!isValidEmail(email)) { msgEl.className = "auth-error"; msgEl.textContent = "Enter a valid email address."; return; }
    submit.disabled = true; submit.textContent = "Sending…";
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/app.html'
    });
    if (error) {
      msgEl.className = "auth-error"; msgEl.textContent = error.message;
      submit.disabled = false; submit.textContent = "Send Reset Link";
    } else {
      msgEl.className = "auth-success";
      msgEl.textContent = "If an account exists for that email, a reset link has been sent.";
      submit.textContent = "Link Sent";
    }
  });
  wrap.appendChild(submit);
  emailField.input.addEventListener("keydown", e => { if (e.key === "Enter") submit.click(); });
  return wrap;
}

function authField(label, type, placeholder) {
  const wrap  = document.createElement("div");
  wrap.className = "auth-field";
  const lbl   = document.createElement("label");
  lbl.className = "auth-label"; lbl.textContent = label;
  const input = document.createElement("input");
  input.className = "auth-input";
  input.type = type;
  input.placeholder = placeholder;
  input.autocomplete = type === "password" ? "current-password" : (type === "email" ? "email" : "name");
  wrap.appendChild(lbl);
  wrap.appendChild(input);
  return { wrap, input };
}

async function onAuthSuccess() {
  hideAuthScreen();
  if (state.profile.name === "" && _currentUser?.user_metadata?.name) {
    state.profile.name = _currentUser.user_metadata.name;
  }
  // Fetch subscription tier from Supabase profiles table
  if (_currentUser) {
    try {
      const { data } = await supabase
        .from("profiles")
        .select("subscription_tier")
        .eq("id", _currentUser.id)
        .single();
      if (data?.subscription_tier) _tier = data.subscription_tier;
    } catch (_) {}
  }
  _curKey = getCurKey();
  loadState();
  applyTheme(getTheme());
  render();
  if (!state.profile.onboarded && !state.firms.length && !state.payouts.length) {
    setTimeout(() => openOnboarding(), 600);
  }
  toast(`Welcome${state.profile.name ? ", " + state.profile.name : ""}!`);
}

async function logout() {
  if (!confirm("Log out of Ledger?")) return;
  await supabase.auth.signOut();
  _currentUser = null;
  document.getElementById("app").innerHTML = "";
  authView = "login";
  showAuthScreen();
}

/* ================================================================
   THEME (dark / light toggle)
   ================================================================ */
function getTheme() { return localStorage.getItem(THEME_KEY) || "dark"; }
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  document.querySelector('meta[name="theme-color"]').content = t === "light" ? "#f1f5f9" : "#080c14";
  localStorage.setItem(THEME_KEY, t);
}
function toggleTheme() {
  applyTheme(getTheme() === "dark" ? "light" : "dark");
  // No rerender needed — renderTop now updates the button icon in-place
  // via its own event listener, preventing the jitter caused by DOM recreation mid-animation.
}

/* ================================================================
   PIN LOCK
   ================================================================ */
function getPin()  { return localStorage.getItem(PIN_KEY) || ""; }
function setPin(p) { if (p) localStorage.setItem(PIN_KEY, p); else localStorage.removeItem(PIN_KEY); }
function isPinSet() { return !!getPin(); }

function showPinScreen(onSuccess, opts = {}) {
  const screen = document.getElementById("pinScreen");
  screen.style.display = "flex";
  screen.innerHTML = "";

  const isSetup   = opts.setup || false;
  const isChange  = opts.change || false;
  let   phase     = isSetup ? "enter" : "verify"; // "enter" → "confirm" → done
  let   firstPin  = "";
  let   entry     = "";

  function label() {
    if (isSetup  && phase === "enter")   return "Choose a 4-digit PIN";
    if (isSetup  && phase === "confirm") return "Confirm your PIN";
    if (isChange && phase === "verify")  return "Enter current PIN";
    if (isChange && phase === "enter")   return "Choose a new PIN";
    if (isChange && phase === "confirm") return "Confirm new PIN";
    return "Enter your PIN";
  }

  function render() {
    screen.innerHTML = "";
    const errEl = document.createElement("div");
    errEl.className = "pin-error-msg";

    const dotsEl = document.createElement("div");
    dotsEl.className = "pin-dots";
    for (let i = 0; i < 4; i++) {
      const d = document.createElement("div");
      d.className = "pin-dot" + (i < entry.length ? " filled" : "");
      dotsEl.appendChild(d);
    }

    const grid = document.createElement("div");
    grid.className = "pin-grid";
    const keys = ["1","2","3","4","5","6","7","8","9","","0","⌫"];
    keys.forEach(k => {
      const btn = document.createElement("button");
      btn.className = "pin-key" + (k === "⌫" ? " del" : "") + (k === "" ? " empty" : "");
      btn.textContent = k;
      btn.style.visibility = k === "" ? "hidden" : "";
      btn.addEventListener("click", () => press(k, dotsEl, errEl));
      grid.appendChild(btn);
    });

    screen.appendChild(document.createElement("div")).className = ""; // spacer
    const logo = document.createElement("div");
    logo.className = "pin-logo"; logo.textContent = "Ledger";
    const lbl = document.createElement("div");
    lbl.className = "pin-label"; lbl.textContent = label();

    screen.appendChild(logo);
    screen.appendChild(lbl);
    screen.appendChild(dotsEl);
    screen.appendChild(grid);
    screen.appendChild(errEl);

    if (!isSetup && !isChange) {
      const cancel = document.createElement("div");
      cancel.className = "pin-change-link";
      cancel.textContent = "Forgot PIN? Use Back up to restore data";
      screen.appendChild(cancel);
    }
  }

  function press(k, dotsEl, errEl) {
    if (k === "⌫") { entry = entry.slice(0, -1); }
    else if (entry.length < 4) { entry += k; }

    // Update dots
    const dots = dotsEl.querySelectorAll(".pin-dot");
    dots.forEach((d, i) => {
      d.className = "pin-dot" + (i < entry.length ? " filled" : "");
    });

    if (entry.length < 4) return;

    // Full 4 digits entered — evaluate
    setTimeout(() => {
      if (phase === "verify") {
        if (entry === getPin()) {
          screen.style.display = "none";
          onSuccess && onSuccess();
        } else {
          errEl.textContent = "Incorrect PIN — try again";
          dots.forEach(d => { d.className = "pin-dot error"; });
          setTimeout(() => { entry = ""; render(); }, 700);
        }
      } else if (phase === "enter") {
        firstPin = entry;
        entry = "";
        phase = "confirm";
        render();
      } else if (phase === "confirm") {
        if (entry === firstPin) {
          setPin(entry);
          screen.style.display = "none";
          toast("PIN set ✓");
          onSuccess && onSuccess();
        } else {
          errEl.textContent = "PINs don't match — start again";
          dots.forEach(d => { d.className = "pin-dot error"; });
          setTimeout(() => { entry = ""; firstPin = ""; phase = "enter"; render(); }, 700);
        }
      }
    }, 120);
  }

  render();
}

function openPinSettings() {
  if (isPinSet()) {
    // Ask to verify first, then offer change or remove
    showPinScreen(() => {
      const action = confirm("PIN is set.\n\nOK = Change PIN\nCancel = Remove PIN");
      if (action) {
        showPinScreen(() => {}, { change: true, setup: false });
      } else {
        setPin("");
        toast("PIN removed");
        rerender();
      }
    }, { change: true });
  } else {
    showPinScreen(() => { rerender(); }, { setup: true });
  }
}

/* ================================================================
   SWIPE TO EDIT (touch + mouse)
   ================================================================ */
function makeSwipeable(contentEl, onEdit, onDelete) {
  const wrap = document.createElement("div");
  wrap.className = "swipe-row";

  const actions = document.createElement("div");
  actions.className = "swipe-actions";

  const editBtn = document.createElement("button");
  editBtn.className = "swipe-action-btn edit";
  editBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit`;
  editBtn.addEventListener("click", (e) => { e.stopPropagation(); close(); onEdit(); });

  const delBtn = document.createElement("button");
  delBtn.className = "swipe-action-btn delete";
  delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>Delete`;
  delBtn.addEventListener("click", (e) => { e.stopPropagation(); close(); onDelete(); });

  actions.appendChild(editBtn);
  actions.appendChild(delBtn);

  const inner = document.createElement("div");
  inner.className = "swipe-content";
  inner.appendChild(contentEl);

  wrap.appendChild(actions);
  wrap.appendChild(inner);

  let startX = 0, startY = 0, isDragging = false, isOpen = false;
  const THRESHOLD = 40;

  function open()  { inner.classList.add("open"); actions.classList.add("visible"); isOpen = true; }
  function close() { inner.classList.remove("open"); actions.classList.remove("visible"); isOpen = false; }

  // Close any other open swipe rows when this one opens
  document.addEventListener("click", (e) => {
    if (isOpen && !wrap.contains(e.target)) close();
  });

  inner.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = false;
  }, { passive: true });

  inner.addEventListener("touchmove", (e) => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!isDragging && Math.abs(dy) > Math.abs(dx)) return; // vertical scroll wins
    isDragging = true;
    if (dx < -THRESHOLD && !isOpen) open();
    else if (dx > THRESHOLD && isOpen) close();
  }, { passive: true });

  inner.addEventListener("touchend", () => { isDragging = false; });

  return wrap;
}

/* ================================================================
   SEARCH & FILTER
   ================================================================ */
function matchesSearch(p) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  const firm = getFirm(p.firmId);
  const acct = getAccount(p.accountId);
  return (
    (firm?.name || "").toLowerCase().includes(q) ||
    (acct?.label || "").toLowerCase().includes(q) ||
    String(p.amount).includes(q) ||
    (p.notes || "").toLowerCase().includes(q) ||
    p.date.includes(q) ||
    (p.status || "").includes(q)
  );
}

function filteredPayouts() {
  return state.payouts.filter(p => {
    if (searchFilter === "received" && p.status !== "received") return false;
    if (searchFilter === "pending"  && p.status !== "awaiting_approval") return false;
    if (searchFilter === "denied"   && p.status !== "denied") return false;
    return matchesSearch(p);
  }).sort((a, b) => b.date.localeCompare(a.date));
}

function renderSearch() {
  // Returns just the search input + filter chips — embedded inside renderRecent's card.
  // The parent (renderRecent) handles showing filtered results below this.
  const wrap = document.createElement("div");
  wrap.style.cssText = "padding: 0 0 14px;";

  const searchInner = document.createElement("div");
  searchInner.className = "search-bar-inner";

  const icon = document.createElement("div");
  icon.className = "search-bar-icon";
  icon.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;

  const input = document.createElement("input");
  input.className = "search-bar";
  input.type = "search";
  input.placeholder = "Search payouts…";
  input.value = searchQuery;
  input.addEventListener("input", (e) => {
    searchQuery = e.target.value;
    rerender(); // re-render so renderRecent picks up the new query
  });

  searchInner.appendChild(icon);
  searchInner.appendChild(input);
  wrap.appendChild(searchInner);

  const filters = document.createElement("div");
  filters.className = "search-filters";
  [
    { id: "all",      label: "All" },
    { id: "received", label: "✓ Received" },
    { id: "pending",  label: "⏳ Awaiting" },
    { id: "denied",   label: "✗ Denied" },
  ].forEach(f => {
    const chip = document.createElement("button");
    chip.className = "filter-chip" + (searchFilter === f.id ? " active" : "");
    chip.textContent = f.label;
    chip.addEventListener("click", () => {
      searchFilter = f.id;
      rerender();
    });
    filters.appendChild(chip);
  });
  wrap.appendChild(filters);

  return wrap;
}

/* ================================================================
   BOOT
   ================================================================ */
// Listen for auth state changes (login, logout, token refresh)
supabase.auth.onAuthStateChange((event, session) => {
  _currentUser = session?.user ?? null;
  if (event === "SIGNED_IN" && document.getElementById("authScreen").style.display !== "none") {
    onAuthSuccess();
  }
  if (event === "SIGNED_OUT" || event === "TOKEN_REFRESHED" && !session) {
    _currentUser = null;
    document.getElementById("app").innerHTML = "";
    authView = "login";
    showAuthScreen();
  }
});

(async function init() {
  applyTheme(getTheme());

  const { data: { session } } = await supabase.auth.getSession();
  _currentUser = session?.user ?? null;

  if (!_currentUser) {
    authView = "login";
    showAuthScreen();
    return;
  }

  loadState();

  if (isPinSet()) {
    render();
    showPinScreen(() => {
      document.getElementById("app").style.display = "";
    });
  } else {
    render();
    if (!state.profile.onboarded && !state.firms.length && !state.payouts.length) {
      setTimeout(() => openOnboarding(), 600);
    }
  }

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) return;
    if (!isPinSet()) return;
    const hiddenAt = parseInt(sessionStorage.getItem("ledger_hidden_at") || "0");
    if (Date.now() - hiddenAt > 60000) showPinScreen(null);
  });
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) sessionStorage.setItem("ledger_hidden_at", Date.now());
  });
})();
</script>
