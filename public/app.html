}

/* ================================================================
   AUTHENTICATION — Supabase
   ================================================================ */

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
}

function getSession() {
  // Returns the cached user object synchronously (set by onAuthStateChange).
  return _currentUser ? { userId: _currentUser.id, email: _currentUser.email } : null;
}
function isLoggedIn() { return !!_currentUser; }

let authView = "login"; // "login" | "register" | "forgot"

function showAuthScreen() {
  const screen = document.getElementById("authScreen");
  screen.style.display = "flex";
  renderAuthView();
}
function hideAuthScreen() {
  document.getElementById("authScreen").style.display = "none";
}

function renderAuthView() {
  const screen = document.getElementById("authScreen");
  screen.innerHTML = "";
  const card = document.createElement("div");
  card.className = "auth-card";
  const brand = document.createElement("div");
  brand.className = "auth-brand";
  brand.innerHTML = `<div class="auth-brand-mark"></div><div class="auth-brand-name">Ledger</div>`;
  card.appendChild(brand);
  if (authView === "login")    card.appendChild(buildLoginForm());
  if (authView === "register") card.appendChild(buildRegisterForm());
  if (authView === "forgot")   card.appendChild(buildForgotForm());
  screen.appendChild(card);
}

function buildLoginForm() {
  const wrap = document.createElement("div");
  const title = document.createElement("div");
  title.className = "auth-title"; title.textContent = "Welcome back";
  const sub = document.createElement("div");
  sub.className = "auth-sub"; sub.textContent = "Log in to access your payouts";
  wrap.appendChild(title); wrap.appendChild(sub);

  const emailField = authField("Email", "email", "you@example.com");
  const pwField    = authField("Password", "password", "••••••••");
  const errEl      = document.createElement("div");
  errEl.className  = "auth-error";
  wrap.appendChild(emailField.wrap);
  wrap.appendChild(pwField.wrap);
  wrap.appendChild(errEl);

  const submit = document.createElement("button");
  submit.className = "auth-submit";
  submit.textContent = "Log In";
  submit.addEventListener("click", async () => {
    const email = emailField.input.value.trim();
    const pw    = pwField.input.value;
    errEl.textContent = "";
    if (!email || !pw) { errEl.textContent = "Enter your email and password."; return; }
    submit.disabled = true; submit.textContent = "Logging in…";
    const { error } = await supabase.auth.signInWithPassword({ email, password: pw });
    if (error) {
      errEl.textContent = error.message === "Invalid login credentials"
        ? "Incorrect email or password." : error.message;
      submit.disabled = false; submit.textContent = "Log In";
    }
    // onAuthStateChange fires automatically on success → onAuthSuccess()
  });
  wrap.appendChild(submit);

  const forgotLink = document.createElement("div");
  forgotLink.className = "auth-switch";
  forgotLink.innerHTML = `<a id="toForgot">Forgot your password?</a>`;
  wrap.appendChild(forgotLink);

  const switchLink = document.createElement("div");
  switchLink.className = "auth-switch";
  switchLink.innerHTML = `Don't have an account? <a id="toRegister">Sign up</a>`;
  wrap.appendChild(switchLink);

  wrap.querySelector("#toForgot").addEventListener("click", () => { authView = "forgot"; renderAuthView(); });
  wrap.querySelector("#toRegister").addEventListener("click", () => { authView = "register"; renderAuthView(); });
  [emailField.input, pwField.input].forEach(inp => {
    inp.addEventListener("keydown", e => { if (e.key === "Enter") submit.click(); });
  });
  return wrap;
}

function buildRegisterForm() {
  const wrap = document.createElement("div");
  const title = document.createElement("div");
  title.className = "auth-title"; title.textContent = "Create your account";
  const sub = document.createElement("div");
  sub.className = "auth-sub"; sub.textContent = "Start tracking your payouts";
  wrap.appendChild(title); wrap.appendChild(sub);

  const firstField = authField("First name", "text", "Jane");
  const lastField  = authField("Last name",  "text", "Smith");
  const emailField = authField("Email", "email", "you@example.com");
  const pwField    = authField("Password", "password", "At least 6 characters");
  const pw2Field   = authField("Confirm Password", "password", "Re-enter your password");
  const errEl      = document.createElement("div");
  errEl.className  = "auth-error";
  wrap.appendChild(firstField.wrap);
  wrap.appendChild(lastField.wrap);
  wrap.appendChild(emailField.wrap);
  wrap.appendChild(pwField.wrap);
  wrap.appendChild(pw2Field.wrap);
  wrap.appendChild(errEl);

  const submit = document.createElement("button");
  submit.className = "auth-submit";
  submit.textContent = "Sign Up";
  submit.addEventListener("click", async () => {
    const firstName = firstField.input.value.trim();
    const lastName  = lastField.input.value.trim();
    const email     = emailField.input.value.trim();
    const pw        = pwField.input.value;
    const pw2       = pw2Field.input.value;
    errEl.textContent = "";
    if (!firstName)           { errEl.textContent = "First name is required."; return; }
    if (!lastName)            { errEl.textContent = "Last name is required."; return; }
    if (!isValidEmail(email)) { errEl.textContent = "Enter a valid email address."; return; }
    if (pw.length < 6)        { errEl.textContent = "Password must be at least 6 characters."; return; }
    if (pw !== pw2)           { errEl.textContent = "Passwords don't match."; return; }
    submit.disabled = true; submit.textContent = "Creating account…";
    errEl.style.color = "#f87171";
    const { data, error } = await supabase.auth.signUp({
      email,
      password: pw,
      options: { data: { first_name: firstName, last_name: lastName } }
    });
    if (error) {
      let msg = error.message;
      const lower = msg.toLowerCase();
      if (lower.includes("already registered") || lower.includes("already exists") ||
          lower.includes("user already") || lower.includes("email address is already")) {
        msg = "An account with this email address already exists. Try logging in instead.";
      }
      errEl.textContent = msg;
      submit.disabled = false; submit.textContent = "Sign Up";
      return;
    }
    // Email confirmation required — session is null until user clicks the link
    if (data?.user && !data?.session) {
      errEl.style.color = "#4ade80";
      errEl.textContent = "Account created! Check your inbox and click the confirmation link, then log in.";
      submit.textContent = "Check your inbox";
      return;
    }
    // Persist first/last name to profiles immediately (session is live after signUp)
    if (data?.user?.id) {
      try {
        await supabase.from("profiles").upsert({
          id: data.user.id,
          first_name: firstName,
          last_name: lastName,
        }, { onConflict: "id" });
      } catch (_) {}
    }
    // onAuthStateChange fires → onAuthSuccess()
  });
  wrap.appendChild(submit);

  const switchLink = document.createElement("div");
  switchLink.className = "auth-switch";
  switchLink.innerHTML = `Already have an account? <a id="toLogin">Log in</a>`;
  wrap.appendChild(switchLink);
  wrap.querySelector("#toLogin").addEventListener("click", () => { authView = "login"; renderAuthView(); });
  [firstField.input, lastField.input, emailField.input, pwField.input, pw2Field.input].forEach(inp => {
    inp.addEventListener("keydown", e => { if (e.key === "Enter") submit.click(); });
  });
  return wrap;
}

function buildForgotForm() {
  const wrap = document.createElement("div");
  const back = document.createElement("div");
  back.className = "auth-back";
  back.innerHTML = `← Back to login`;
  back.addEventListener("click", () => { authView = "login"; renderAuthView(); });
  wrap.appendChild(back);

  const title = document.createElement("div");
  title.className = "auth-title"; title.textContent = "Reset your password";
  const sub = document.createElement("div");
  sub.className = "auth-sub"; sub.textContent = "We'll send a reset link to your email";
  wrap.appendChild(title); wrap.appendChild(sub);

  const emailField = authField("Email", "email", "you@example.com");
  const msgEl      = document.createElement("div");
  msgEl.className  = "auth-error";
  wrap.appendChild(emailField.wrap);
  wrap.appendChild(msgEl);

  const submit = document.createElement("button");
  submit.className = "auth-submit";
  submit.textContent = "Send Reset Link";
  submit.addEventListener("click", async () => {
    const email = emailField.input.value.trim();
    if (!isValidEmail(email)) { msgEl.className = "auth-error"; msgEl.textContent = "Enter a valid email address."; return; }
    submit.disabled = true; submit.textContent = "Sending…";
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/app.html'
    });
    if (error) {
      msgEl.className = "auth-error"; msgEl.textContent = error.message;
      submit.disabled = false; submit.textContent = "Send Reset Link";
    } else {
      msgEl.className = "auth-success";
      msgEl.textContent = "If an account exists for that email, a reset link has been sent.";
      submit.textContent = "Link Sent";
    }
  });
  wrap.appendChild(submit);
  emailField.input.addEventListener("keydown", e => { if (e.key === "Enter") submit.click(); });
  return wrap;
}

function authField(label, type, placeholder) {
  const wrap  = document.createElement("div");
  wrap.className = "auth-field";
  const lbl   = document.createElement("label");
  lbl.className = "auth-label"; lbl.textContent = label;
  const input = document.createElement("input");
  input.className = "auth-input";
  input.type = type;
  input.placeholder = placeholder;
  input.autocomplete = type === "password" ? "current-password" : (type === "email" ? "email" : "name");
  wrap.appendChild(lbl);
  wrap.appendChild(input);
  return { wrap, input };
}

async function onAuthSuccess() {
  hideAuthScreen();
  // Seed first/last name from auth metadata (set at sign-up) if not yet in state
  if (!state.profile.firstName && _currentUser?.user_metadata?.first_name) {
    state.profile.firstName = _currentUser.user_metadata.first_name;
  }
  if (!state.profile.lastName && _currentUser?.user_metadata?.last_name) {
    state.profile.lastName = _currentUser.user_metadata.last_name;
  }
  // Fetch subscription tier
  if (_currentUser) {
    try {
      const { data } = await supabase
        .from("profiles")
        .select("subscription_tier")
        .eq("id", _currentUser.id)
        .single();
      if (data?.subscription_tier) _tier = data.subscription_tier;
    } catch (_) {}
  }
  _curKey = getCurKey();
  loadState();
  applyTheme(getTheme());
  renderSidebar();
  renderBottomNav();
  render();
  const greeting = state.profile.username || state.profile.firstName;
  toast(`Welcome${greeting ? ", " + greeting : ""}!`);
  syncFromSupabase();
}

function logout() {
  alertSheet({
    title: "Log Out",
    body: "You'll be returned to the login screen. Your data stays saved.",
    buttons: [{ label: "Log Out", variant: "danger", action: async () => {
      await supabase.auth.signOut();
      _currentUser = null;
      document.getElementById("app").innerHTML = "";
      document.getElementById("sidebar").innerHTML = "";
      document.getElementById("bottomNav").innerHTML = "";
      authView = "login";
      showAuthScreen();
    }}]
  });
}

/* ================================================================
   THEME (dark / light toggle)
   ================================================================ */
function getTheme() { return localStorage.getItem(THEME_KEY) || "dark"; }
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  document.querySelector('meta[name="theme-color"]').content = t === "light" ? "#f1f5f9" : "#080c14";
  localStorage.setItem(THEME_KEY, t);
}
function toggleTheme() {
  applyTheme(getTheme() === "dark" ? "light" : "dark");
  // No rerender needed — renderTop now updates the button icon in-place
  // via its own event listener, preventing the jitter caused by DOM recreation mid-animation.
}

/* ================================================================
   PIN LOCK
   ================================================================ */
function getPin()  { return localStorage.getItem(PIN_KEY) || ""; }
function setPin(p) { if (p) localStorage.setItem(PIN_KEY, p); else localStorage.removeItem(PIN_KEY); }
function isPinSet() { return !!getPin(); }

function showPinScreen(onSuccess, opts = {}) {
  const screen = document.getElementById("pinScreen");
  screen.style.display = "flex";
  screen.innerHTML = "";

  const isSetup   = opts.setup || false;
  const isChange  = opts.change || false;
  let   phase     = isSetup ? "enter" : "verify"; // "enter" → "confirm" → done
  let   firstPin  = "";
  let   entry     = "";

  function label() {
    if (isSetup  && phase === "enter")   return "Choose a 4-digit PIN";
    if (isSetup  && phase === "confirm") return "Confirm your PIN";
    if (isChange && phase === "verify")  return "Enter current PIN";
    if (isChange && phase === "enter")   return "Choose a new PIN";
    if (isChange && phase === "confirm") return "Confirm new PIN";
    return "Enter your PIN";
  }

  function render() {
    screen.innerHTML = "";
    const errEl = document.createElement("div");
    errEl.className = "pin-error-msg";

    const dotsEl = document.createElement("div");
    dotsEl.className = "pin-dots";
    for (let i = 0; i < 4; i++) {
      const d = document.createElement("div");
      d.className = "pin-dot" + (i < entry.length ? " filled" : "");
      dotsEl.appendChild(d);
    }

    const grid = document.createElement("div");
    grid.className = "pin-grid";
    const keys = ["1","2","3","4","5","6","7","8","9","","0","⌫"];
    keys.forEach(k => {
      const btn = document.createElement("button");
      btn.className = "pin-key" + (k === "⌫" ? " del" : "") + (k === "" ? " empty" : "");
      btn.textContent = k;
      btn.style.visibility = k === "" ? "hidden" : "";
      btn.addEventListener("click", () => press(k, dotsEl, errEl));
      grid.appendChild(btn);
    });

    screen.appendChild(document.createElement("div")).className = ""; // spacer
    const logo = document.createElement("div");
    logo.className = "pin-logo"; logo.textContent = "Ledger";
    const lbl = document.createElement("div");
    lbl.className = "pin-label"; lbl.textContent = label();

    screen.appendChild(logo);
    screen.appendChild(lbl);
    screen.appendChild(dotsEl);
    screen.appendChild(grid);
    screen.appendChild(errEl);

    if (!isSetup && !isChange) {
      const cancel = document.createElement("div");
      cancel.className = "pin-change-link";
      cancel.textContent = "Forgot PIN? Log in again to reset it";
      screen.appendChild(cancel);
    }
  }

  function press(k, dotsEl, errEl) {
    if (k === "⌫") { entry = entry.slice(0, -1); }
    else if (entry.length < 4) { entry += k; }

    // Update dots
    const dots = dotsEl.querySelectorAll(".pin-dot");
    dots.forEach((d, i) => {
      d.className = "pin-dot" + (i < entry.length ? " filled" : "");
    });

    if (entry.length < 4) return;

    // Full 4 digits entered — evaluate
    setTimeout(() => {
      if (phase === "verify") {
        if (entry === getPin()) {
          screen.style.display = "none";
          onSuccess && onSuccess();
        } else {
          errEl.textContent = "Incorrect PIN — try again";
          dots.forEach(d => { d.className = "pin-dot error"; });
          setTimeout(() => { entry = ""; render(); }, 700);
        }
      } else if (phase === "enter") {
        firstPin = entry;
        entry = "";
        phase = "confirm";
        render();
      } else if (phase === "confirm") {
        if (entry === firstPin) {
          setPin(entry);
          screen.style.display = "none";
          toast("PIN set ✓");
          onSuccess && onSuccess();
        } else {
          errEl.textContent = "PINs don't match — start again";
          dots.forEach(d => { d.className = "pin-dot error"; });
          setTimeout(() => { entry = ""; firstPin = ""; phase = "enter"; render(); }, 700);
        }
      }
    }, 120);
  }

  render();
}

function openPinSettings() {
  if (isPinSet()) {
    // Ask to verify first, then offer change or remove
    showPinScreen(() => {
      alertSheet({
        title: "PIN Lock",
        body: "Your PIN is set. Would you like to change it or remove it?",
        cancelLabel: "Keep PIN",
        buttons: [
          { label: "Change PIN", variant: "ghost", action: () => showPinScreen(() => {}, { change: true, setup: false }) },
          { label: "Remove PIN", variant: "danger", action: () => { setPin(""); toast("PIN removed"); rerender(); } }
        ]
      });
    }, { change: true });
  } else {
    showPinScreen(() => { rerender(); }, { setup: true });
  }
}

/* ================================================================
   SWIPE TO EDIT (touch + mouse)
   ================================================================ */
function makeSwipeable(contentEl, onEdit, onDelete) {
  const wrap = document.createElement("div");
  wrap.className = "swipe-row";

  const actions = document.createElement("div");
  actions.className = "swipe-actions";

  const editBtn = document.createElement("button");
  editBtn.className = "swipe-action-btn edit";
  editBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit`;
  editBtn.addEventListener("click", (e) => { e.stopPropagation(); close(); onEdit(); });

  const delBtn = document.createElement("button");
  delBtn.className = "swipe-action-btn delete";
  delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>Delete`;
  delBtn.addEventListener("click", (e) => { e.stopPropagation(); close(); onDelete(); });

  actions.appendChild(editBtn);
  actions.appendChild(delBtn);

  const inner = document.createElement("div");
  inner.className = "swipe-content";
  inner.appendChild(contentEl);

  wrap.appendChild(actions);
  wrap.appendChild(inner);

  let startX = 0, startY = 0, isDragging = false, isOpen = false;
  const THRESHOLD = 40;

  function open()  { inner.classList.add("open"); actions.classList.add("visible"); isOpen = true; }
  function close() { inner.classList.remove("open"); actions.classList.remove("visible"); isOpen = false; }

  // Close any other open swipe rows when this one opens
  document.addEventListener("click", (e) => {
    if (isOpen && !wrap.contains(e.target)) close();
  });

  inner.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = false;
  }, { passive: true });

  inner.addEventListener("touchmove", (e) => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!isDragging && Math.abs(dy) > Math.abs(dx)) return; // vertical scroll wins
    isDragging = true;
    if (dx < -THRESHOLD && !isOpen) open();
    else if (dx > THRESHOLD && isOpen) close();
  }, { passive: true });

  inner.addEventListener("touchend", () => { isDragging = false; });

  return wrap;
}

/* ================================================================
   SEARCH & FILTER
   ================================================================ */
function matchesSearch(p) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  const firm = getFirm(p.firmId);
  const acct = getAccount(p.accountId);
  return (
    (firm?.name || "").toLowerCase().includes(q) ||
    (acct?.label || "").toLowerCase().includes(q) ||
    String(p.amount).includes(q) ||
    (p.notes || "").toLowerCase().includes(q) ||
    p.date.includes(q) ||
    (p.status || "").includes(q)
  );
}

function filteredPayouts() {
  return state.payouts.filter(p => {
    if (searchFilter === "received" && p.status !== "received") return false;
    if (searchFilter === "pending"  && p.status !== "awaiting_approval") return false;
    if (searchFilter === "denied"   && p.status !== "denied") return false;
    return matchesSearch(p);
  }).sort((a, b) => b.date.localeCompare(a.date));
}

function renderSearch() {
  // Returns just the search input + filter chips — embedded inside renderRecent's card.
  // The parent (renderRecent) handles showing filtered results below this.
  const wrap = document.createElement("div");
  wrap.style.cssText = "padding: 0 0 14px;";

  const searchInner = document.createElement("div");
  searchInner.className = "search-bar-inner";

  const icon = document.createElement("div");
  icon.className = "search-bar-icon";
  icon.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;

  const input = document.createElement("input");
  input.className = "search-bar";
  input.type = "search";
  input.placeholder = "Search payouts…";
  input.value = searchQuery;
  input.addEventListener("input", (e) => {
    searchQuery = e.target.value;
    rerender(); // re-render so renderRecent picks up the new query
  });

  searchInner.appendChild(icon);
  searchInner.appendChild(input);
  wrap.appendChild(searchInner);

  const filters = document.createElement("div");
  filters.className = "search-filters";
  [
    { id: "all",      label: "All" },
    { id: "received", label: "✓ Received" },
    { id: "pending",  label: "⏳ Awaiting" },
    { id: "denied",   label: "✗ Denied" },
  ].forEach(f => {
    const chip = document.createElement("button");
    chip.className = "filter-chip" + (searchFilter === f.id ? " active" : "");
    chip.textContent = f.label;
    chip.addEventListener("click", () => {
      searchFilter = f.id;
      rerender();
    });
    filters.appendChild(chip);
  });
  wrap.appendChild(filters);

  return wrap;
}

/* ================================================================
   BOOT
   ================================================================ */
// Listen for auth state changes (login, logout, token refresh)
supabase.auth.onAuthStateChange((event, session) => {
  _currentUser = session?.user ?? null;
  if (event === "SIGNED_IN" && document.getElementById("authScreen").style.display !== "none") {
    onAuthSuccess();
  }
  if (event === "SIGNED_OUT" || event === "TOKEN_REFRESHED" && !session) {
    _currentUser = null;
    document.getElementById("app").innerHTML = "";
    document.getElementById("sidebar").innerHTML = "";
    document.getElementById("bottomNav").innerHTML = "";
    authView = "login";
    showAuthScreen();
  }
});

(async function init() {
  applyTheme(getTheme());

  const { data: { session } } = await supabase.auth.getSession();
  _currentUser = session?.user ?? null;

  if (!_currentUser) {
    authView = "login";
    showAuthScreen();
    return;
  }

  loadState();

  if (isPinSet()) {
    render();
    showPinScreen(() => {
      document.getElementById("app").style.display = "";
      syncFromSupabase();
    });
  } else {
    render();
    syncFromSupabase();
  }

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) return;
    if (!isPinSet()) return;
    const hiddenAt = parseInt(sessionStorage.getItem("ledger_hidden_at") || "0");
    if (Date.now() - hiddenAt > 60000) showPinScreen(null);
  });
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) sessionStorage.setItem("ledger_hidden_at", Date.now());
  });
})();
</script>
