    font-size: 11px;
    color: var(--text-3);
    line-height: 1.4;
    position: relative;
    z-index: 1;
  }
  .achievement-status {
    margin-top: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    position: relative;
    z-index: 1;
  }
  .achievement-status.unlocked { color: var(--jade-1); }
  .achievement-status.locked   { color: var(--text-4); }

  .unlock-flash {
    animation: unlockPop .5s var(--ease-spring) forwards;
  }
  @keyframes unlockPop {

function loadState() {
  try {
    const raw = localStorage.getItem(scopedKey(STORAGE_KEY));
    if (raw) {
      const saved = JSON.parse(raw);
      // shallow-merge so new fields appear on upgrades
      state = {
        profile: { ...DEFAULT_STATE.profile, ...(saved.profile || {}), goals: { ...DEFAULT_STATE.profile.goals, ...((saved.profile || {}).goals || {}) } },
        firms: saved.firms || [],
        accounts: saved.accounts || [],
        payouts: saved.payouts || [],
        spending: saved.spending || [],
        journal: saved.journal || [],
        ui: { ...DEFAULT_STATE.ui, ...(saved.ui || {}) }
      };
      // Migration: retired statuses ("needs_trading_days", "being_paid") collapse into "awaiting_approval"
      state.payouts.forEach(p => {
        if (p.status === "needs_trading_days" || p.status === "being_paid") {
          p.status = "awaiting_approval";
        }
      });
      // Migration: old profile.name → firstName (when upgrading from single-name era)
      if (state.profile.name !== undefined && !state.profile.firstName) {
        state.profile.firstName = state.profile.name;
      }
      delete state.profile.name;
      delete state.profile.onboarded;
      // Firms used to carry a `health` field — silently drop it
      state.firms.forEach(f => { delete f.health; });
      // Migration: old account health statuses → new Passed/In Progress/Failed
      state.accounts.forEach(a => {
        if (a.health === "eligible" || a.health === "ready") a.health = "passed";
        else if (a.health === "building" || a.health === "needs_days") a.health = "in_progress";
      });
    }
  } catch (e) {
    // first run or corrupt data — start fresh
    console.warn("loadState failed:", e);
  }
  hasLoaded = true;
}

let saveTimer = null;
function saveState() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(scopedKey(STORAGE_KEY), JSON.stringify(state));
    } catch (e) {
      console.error("save failed", e);
    }
  }, 200);
  queueSupabaseSync();
}

let _sbSyncTimer = null;
function queueSupabaseSync() {
  if (!_currentUser) return;
  if (_sbSyncTimer) clearTimeout(_sbSyncTimer);
  _sbSyncTimer = setTimeout(syncToSupabase, 1000);
}

async function syncToSupabase() {
  if (!_currentUser) return;
  const userId = _currentUser.id;
  const firmIds    = new Set(state.firms.map(f => f.id));
  const accountIds = new Set(state.accounts.map(a => a.id));
  try {
    // Step 1 — profile + firms (no deps on each other)
    await Promise.all([
      supabase.from("profiles").upsert({
        id: userId,
        first_name: state.profile.firstName || null,
        last_name:  state.profile.lastName  || null,
        username:   state.profile.username  ? state.profile.username.toLowerCase() : null,
        goals_daily:   state.profile.goals.daily,
        goals_weekly:  state.profile.goals.weekly,
        goals_monthly: state.profile.goals.monthly,
        goals_annual:  state.profile.goals.annual,
      }, { onConflict: "id" }),
      state.firms.length
        ? supabase.from("firms").upsert(
            state.firms.map(f => ({ id: f.id, user_id: userId, name: f.name })),
            { onConflict: "id" }
          )
        : Promise.resolve(),
    ]);
    // Step 2 — accounts (FK firms)
    if (state.accounts.length) {
      await supabase.from("accounts").upsert(
        state.accounts.map(a => ({ id: a.id, user_id: userId, firm_id: a.firmId, label: a.label, health: a.health || "active" })),
        { onConflict: "id" }
      );
    }
    // Step 3 — payouts, spending, journal (FK firms + accounts)
    await Promise.all([
      state.payouts.length
        ? supabase.from("payouts").upsert(
            state.payouts.map(p => ({
              id: p.id, user_id: userId,
              firm_id:    firmIds.has(p.firmId)    ? p.firmId    : null,
              account_id: accountIds.has(p.accountId) ? p.accountId : null,
              amount: p.amount, date: p.date, status: p.status, notes: p.notes || null,
            })),
            { onConflict: "id" }
          )
        : Promise.resolve(),
      state.spending.length
        ? supabase.from("spending").upsert(
            state.spending.map(s => ({
              id: s.id, user_id: userId,
              firm_id:    firmIds.has(s.firmId)    ? s.firmId    : null,
              account_id: accountIds.has(s.accountId) ? s.accountId : null,
              amount: s.amount, date: s.date, category: s.category || "other", notes: s.notes || null,
            })),
            { onConflict: "id" }
          )
        : Promise.resolve(),
      state.journal.length
        ? supabase.from("journal").upsert(
            state.journal.map(j => ({ user_id: userId, date: j.date, text: j.text })),
            { onConflict: "user_id,date" }
          )
        : Promise.resolve(),
    ]);
  } catch (e) { console.warn("syncToSupabase failed:", e); }
}

async function syncFromSupabase() {
  if (!_currentUser) return;
  try {
    const [profileRes, firmsRes, acctRes, payRes, spendRes, jRes] = await Promise.all([
      supabase.from("profiles").select("*").eq("id", _currentUser.id).single(),
      supabase.from("firms").select("*").eq("user_id", _currentUser.id),
      supabase.from("accounts").select("*").eq("user_id", _currentUser.id),
      supabase.from("payouts").select("*").eq("user_id", _currentUser.id),
      supabase.from("spending").select("*").eq("user_id", _currentUser.id),
      supabase.from("journal").select("*").eq("user_id", _currentUser.id),
    ]);
    const pr       = profileRes.data;
    const firms    = firmsRes.data    || [];
    const accounts = acctRes.data     || [];
    const payouts  = payRes.data      || [];
    const spending = spendRes.data    || [];
    const journal  = jRes.data        || [];
    if (pr?.subscription_tier) _tier = pr.subscription_tier;
    const hasRemote = firms.length || accounts.length || payouts.length || spending.length;
    const hasLocal  = state.firms.length || state.payouts.length || state.spending.length;
    if (!hasRemote && hasLocal) { await syncToSupabase(); return; }
    if (!hasRemote && !hasLocal) return; // brand-new user — nothing to sync
    state = {
      profile: {
        // first_name/last_name fall back to old profile.name for users who signed up before this migration
        firstName: pr?.first_name || (pr?.name && !pr?.first_name ? pr.name : "") || state.profile.firstName || "",
        lastName:  pr?.last_name  || state.profile.lastName  || "",
        username:  pr?.username   || state.profile.username  || "",
        goals: {
          daily:   pr?.goals_daily   ?? state.profile.goals.daily,
          weekly:  pr?.goals_weekly  ?? state.profile.goals.weekly,
          monthly: pr?.goals_monthly ?? state.profile.goals.monthly,
          annual:  pr?.goals_annual  ?? state.profile.goals.annual,
        },
      },
      firms:    firms.map(f => ({ id: f.id, name: f.name })),
      accounts: accounts.map(a => ({ id: a.id, firmId: a.firm_id, label: a.label, health: a.health })),
      payouts:  payouts.map(p => ({ id: p.id, firmId: p.firm_id || "", accountId: p.account_id || "", amount: Number(p.amount), date: p.date, status: p.status, notes: p.notes || "" })),
      spending: spending.map(s => ({ id: s.id, firmId: s.firm_id || "", accountId: s.account_id || "", amount: Number(s.amount), date: s.date, category: s.category, notes: s.notes || "" })),
      journal:  journal.map(j => ({ id: String(j.id), date: j.date, text: j.text })),
      ui: state.ui,
    };
    // Apply the same status migrations as loadState
    state.payouts.forEach(p => {
      if (p.status === "needs_trading_days" || p.status === "being_paid") p.status = "awaiting_approval";
    });
    state.accounts.forEach(a => {
      if (a.health === "eligible" || a.health === "ready") a.health = "passed";
      else if (a.health === "building" || a.health === "needs_days") a.health = "in_progress";
    });
    // Cache locally without triggering another Supabase push
    try { localStorage.setItem(scopedKey(STORAGE_KEY), JSON.stringify(state)); } catch {}
    render();
  } catch (e) { console.warn("syncFromSupabase failed:", e); }
}

/* ================================================================
   FORMATTERS & DATE HELPERS
   ================================================================ */
const _nf2 = new Intl.NumberFormat("en-GB", { maximumFractionDigits: 2, minimumFractionDigits: 2 });
const _nf0 = new Intl.NumberFormat("en-GB", { maximumFractionDigits: 0 });

function fmtGBP(n, opts = {}) {
  if (n == null || isNaN(n)) return _sym() + "0";
  const abs  = Math.abs(n);
  const sign = n < 0 ? "−" : "";
  return sign + _sym() + (opts.short ? _nf0 : _nf2).format(abs);
}

function compactGBP(n) {
  // For tight slots (calendar cells): £850, £1.2k, £27.8k, £250k, £1.5M
  if (n == null || isNaN(n) || n === 0) return "";
  const s    = _sym();
  const abs  = Math.abs(n);
  const sign = n < 0 ? "−" : "";
  if (abs >= 1000000) return sign + s + (abs/1000000).toFixed(1).replace(/\.0$/,'') + "M";
  if (abs >= 100000)  return sign + s + Math.round(abs/1000) + "k";
  if (abs >= 1000)    return sign + s + (abs/1000).toFixed(1).replace(/\.0$/,'') + "k";
  return sign + s + Math.round(abs);
}

function fmtAmountParts(n) {
  // Returns { whole: "£27,840", pence: ".62" } for hero display
  if (n == null || isNaN(n)) return { whole: _sym() + "0", pence: "" };
  const fixed = n.toFixed(2);
  const [intStr, decStr] = fixed.split(".");
  const withCommas = Number(intStr).toLocaleString("en-GB");
  return { whole: _sym() + withCommas, pence: "." + decStr };
}

function localISO(d) {
  // Format a Date as YYYY-MM-DD using its local components (avoids UTC day-shift).
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const dy = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${dy}`;
}
function localMonthISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  return `${y}-${m}`;
}
function todayISO() {
  return localISO(new Date());
}

function parseISO(iso) {
  // Always interpret as local date at noon to avoid TZ slippage
  if (!iso) return null;
  const [y, m, d] = iso.split("-").map(Number);
  return new Date(y, m - 1, d, 12, 0, 0);
}

function daysBetween(fromISO, toISO) {
  const a = parseISO(fromISO);
  const b = parseISO(toISO);
  if (!a || !b) return 0;
  return Math.round((b - a) / 86400000);
}

function fmtDateShort(iso) {
  const d = parseISO(iso);
  if (!d) return "";
  return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
}
function fmtDateLong(iso) {
  const d = parseISO(iso);
  if (!d) return "";
  return d.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
}
function fmtMonthYear(iso) {
  const d = parseISO(iso);
  if (!d) return "";
  return d.toLocaleDateString("en-GB", { month: "long", year: "numeric" });
}
function monthKey(iso) { return iso ? iso.slice(0, 7) : ""; }

function startOfWeekISO(iso) {
  // ISO week starts Monday
  const d = parseISO(iso);
  const day = d.getDay(); // 0 Sun .. 6 Sat
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return localISO(d);
}
function endOfWeekISO(iso) {
  const s = parseISO(startOfWeekISO(iso));
  s.setDate(s.getDate() + 6);
  return localISO(s);
}

function isSameDay(a, b) { return a === b; }
function isInRange(date, start, end) { return date >= start && date <= end; }

/* ================================================================
   CALCULATIONS
   ================================================================ */
const today = () => todayISO();

function received() { return state.payouts.filter(p => p.status === "received"); }
function pendingPayouts() { return state.payouts.filter(p => p.status !== "received" && p.status !== "denied"); }
function upcomingSorted() {
  return pendingPayouts().slice().sort((a, b) => a.date.localeCompare(b.date));
}
function recentReceived() {
  return received().slice().sort((a, b) => b.date.localeCompare(a.date));
}
function recentSettled() {
  // Things that have a final outcome (paid or rejected). Used in the "Recent Payouts" list.
  // Denied are shown for context but are NOT counted in lifetime/totals (those use received() only).
  return state.payouts
    .filter(p => p.status === "received" || p.status === "denied")
    .slice()
    .sort((a, b) => b.date.localeCompare(a.date));
}

function lifetimeWithdrawals() {
  return received().reduce((s, p) => s + Number(p.amount || 0), 0);
}
function sumInRange(filterFn) {
  return state.payouts.filter(filterFn).reduce((s, p) => s + Number(p.amount || 0), 0);
}
function earnedToday() {
  const t = today();
  return sumInRange(p => p.status === "received" && p.date === t);
}
function earnedThisWeek() {
  const s = startOfWeekISO(today()), e = endOfWeekISO(today());
  return sumInRange(p => p.status === "received" && p.date >= s && p.date <= e);
}
function earnedThisMonth() {
  const m = monthKey(today());
  return sumInRange(p => p.status === "received" && monthKey(p.date) === m);
}
function earnedThisYear() {
  const y = today().slice(0, 4);
  return sumInRange(p => p.status === "received" && p.date.startsWith(y));
}
function earnedLastMonth() {
  const d = parseISO(today());
  d.setMonth(d.getMonth() - 1);
  const m = localMonthISO(d);
  return sumInRange(p => p.status === "received" && monthKey(p.date) === m);
}

function pctDeltaMonthOverMonth() {
  const cur = earnedThisMonth();
  const prev = earnedLastMonth();
  if (prev === 0) return cur > 0 ? 100 : 0;
  return ((cur - prev) / prev) * 100;
}

function nextPayout() {
  return upcomingSorted()[0] || null;
}

function avgPayout() {
  const r = received();
  if (!r.length) return 0;
  return r.reduce((s, p) => s + Number(p.amount), 0) / r.length;
}
function largestPayout() {
  const r = received();
  if (!r.length) return null;
  return r.reduce((a, b) => (Number(a.amount) >= Number(b.amount) ? a : b));
}
function largestMonth() {
  const r = received();
  if (!r.length) return null;
  const m = {};
  r.forEach(p => { const k = monthKey(p.date); m[k] = (m[k] || 0) + Number(p.amount); });
  let best = null;
  for (const k in m) { if (!best || m[k] > best.total) best = { key: k, total: m[k] }; }
  return best;
}
function avgMonthlyIncome() {
  const r = received();
  if (!r.length) return 0;
  const months = new Set(r.map(p => monthKey(p.date)));
  return r.reduce((s, p) => s + Number(p.amount), 0) / months.size;
}
function payoutSuccessRate() {
  const total = state.payouts.filter(p => p.status === "received" || p.status === "denied").length;
  if (!total) return null;
  return (received().length / total) * 100;
}
function paidThisMonthCount() {
  const m = monthKey(today());
  return received().filter(p => monthKey(p.date) === m).length;
}
function withdrawalStreak() {
  // Consecutive months ending at current month (or last month if current is empty) with ≥1 received
  const r = received();
  if (!r.length) return 0;
  const months = new Set(r.map(p => monthKey(p.date)));
  const cur = parseISO(today());
  let pointer = new Date(cur.getFullYear(), cur.getMonth(), 15);
  // If this month is empty but last month had payouts, the streak still "lives"
  let streak = 0;
  let started = false;
  for (let i = 0; i < 240; i++) {
    const k = localMonthISO(pointer);
    if (months.has(k)) {
      streak++;
      started = true;
    } else {
      if (started) break;
      // first iteration current-month miss is allowed
      if (i > 0) break;
    }
    pointer.setMonth(pointer.getMonth() - 1);
  }
  return streak;
}
function daysSinceLastWithdrawal() {
  const r = recentReceived();
  if (!r.length) return null;
  return daysBetween(r[0].date, today());
}

function eligibleAccountsCount() {
  // "Passed" accounts are payout-ready
  return state.accounts.filter(a => a.health === "passed" || a.health === "eligible" || a.health === "ready").length;
}

function pendingTotal() { return pendingPayouts().reduce((s, p) => s + Number(p.amount || 0), 0); }

/* ----- Spending / Net ----- */
function lifetimeSpend() {
  return state.spending.reduce((s, x) => s + Number(x.amount || 0), 0);
}
function netProfit() { return lifetimeWithdrawals() - lifetimeSpend(); }
function spendThisMonth() {
  const m = monthKey(today());
  return state.spending.filter(x => monthKey(x.date) === m).reduce((s, x) => s + Number(x.amount), 0);
}
function spendThisYear() {
  const y = today().slice(0, 4);
  return state.spending.filter(x => x.date.startsWith(y)).reduce((s, x) => s + Number(x.amount), 0);
}
function spendingByCategory() {
  const out = {};
  SPENDING_CATEGORIES.forEach(c => out[c.id] = 0);
  state.spending.forEach(x => { out[x.category] = (out[x.category] || 0) + Number(x.amount); });
  return out;
}
function recentSpending() {
  return state.spending.slice().sort((a, b) => b.date.localeCompare(a.date));
}
function expectedThisWeek() {
  const s = startOfWeekISO(today()), e = endOfWeekISO(today());
  return pendingPayouts().filter(p => p.date >= s && p.date <= e).reduce((s2, p) => s2 + Number(p.amount), 0);
}
function expectedThisMonth() {
  const m = monthKey(today());
  return pendingPayouts().filter(p => monthKey(p.date) === m).reduce((s, p) => s + Number(p.amount), 0);
}
function expectedNextMonth() {
  const d = parseISO(today());
  d.setMonth(d.getMonth() + 1);
  const m = localMonthISO(d);
  return pendingPayouts().filter(p => monthKey(p.date) === m).reduce((s, p) => s + Number(p.amount), 0);
}

function monthlyEarningsSeries(months = 6) {
  // Returns last N months including current
  const out = [];
  const now = parseISO(today());
  for (let i = months - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const k = localMonthISO(d);
    const label = d.toLocaleDateString("en-GB", { month: "short" });
    const total = sumInRange(p => p.status === "received" && monthKey(p.date) === k);
    out.push({ key: k, label, total });
  }
  return out;
}

/* ---- Average time from submission to payment (days) ---- */
function avgTimeToPayoutDays() {
  // Only payouts that have both a date and status=received can be measured.
  // We treat the payout date as the "expected/submitted" date.
  // To calculate actual wait time we'd need a submission date field,
  // so instead we measure average days between consecutive received payouts per firm.
  // Returns null if insufficient data.
  const r = recentReceived();
  if (r.length < 2) return null;
  // Sort oldest first
  const sorted = r.slice().sort((a, b) => a.date.localeCompare(b.date));
  let total = 0;
  for (let i = 1; i < sorted.length; i++) {
    total += daysBetween(sorted[i - 1].date, sorted[i].date);
  }
  return Math.round(total / (sorted.length - 1));
}

/* ---- Projected annual income based on trailing 3-month avg ---- */
function projectedAnnualIncome() {
  const series = monthlyEarningsSeries(3);
  const avg = series.reduce((s, d) => s + d.total, 0) / series.length;
  return avg * 12;
}

/* ---- Payout velocity: % change last 30d vs prior 30d ---- */
function payoutVelocity() {
  const t = today();
  const now = parseISO(t);
  const d30 = new Date(now); d30.setDate(d30.getDate() - 30);
  const d60 = new Date(now); d60.setDate(d60.getDate() - 60);
  const d30iso = localISO(d30);
  const d60iso = localISO(d60);
  const recent30 = sumInRange(p => p.status === "received" && p.date > d30iso && p.date <= t);
  const prior30  = sumInRange(p => p.status === "received" && p.date > d60iso && p.date <= d30iso);
  if (prior30 === 0) return recent30 > 0 ? 100 : 0;
  return Math.round(((recent30 - prior30) / prior30) * 100);
}

/* ---- Firm leaderboard ---- */
function firmLeaderboard() {
  return state.firms.map(firm => {
    const firmPayouts = payoutsForFirm(firm.id);
    const firmReceived = firmPayouts.filter(p => p.status === "received");
    const firmDenied   = firmPayouts.filter(p => p.status === "denied");
    const total = firmReceived.reduce((s, p) => s + Number(p.amount || 0), 0);
    const denialRate = (firmReceived.length + firmDenied.length) > 0
      ? Math.round((firmDenied.length / (firmReceived.length + firmDenied.length)) * 100)
      : null;
    return { firm, total, count: firmReceived.length, denied: firmDenied.length, denialRate };
  }).sort((a, b) => b.total - a.total);
}

/* ---- Pass rate & Fee ROI ---- */
function accountPassRate() {
  const passed = state.accounts.filter(a => a.health === "passed").length;
  const failed = state.accounts.filter(a => a.health === "failed").length;
  const total = passed + failed;
  if (!total) return null;
  return { rate: Math.round((passed / total) * 100), passed, failed, total };
}

function challengeFees() {
  return state.spending
    .filter(s => s.category === "account_purchase")
    .reduce((sum, s) => sum + Number(s.amount || 0), 0);
}

function feeROI() {
  const fees = challengeFees();
  if (!fees) return null;
  return ((lifetimeWithdrawals() - fees) / fees) * 100;
}

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === "class") e.className = attrs[k];
    else if (k === "html") e.innerHTML = attrs[k];
    else if (k.startsWith("on") && typeof attrs[k] === "function") e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (attrs[k] != null) e.setAttribute(k, attrs[k]);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    if (typeof c === "string" || typeof c === "number") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

    item.addEventListener("click", () => navigateTo(page.id));
    list.appendChild(item);
  });

  drawer.appendChild(list);

  // Footer — user info + logout
  const session = getSession();
  const footer = document.createElement("div");
  footer.className = "nav-footer";

  if (session) {
    const userInfo = document.createElement("div");
    userInfo.style.cssText = "font-size:12px;color:var(--text-3);padding:4px 12px 10px;";
    userInfo.textContent = session.email;
    footer.appendChild(userInfo);
  }

  const logoutBtn = document.createElement("button");
  logoutBtn.className = "nav-item";
  logoutBtn.style.color = "var(--rose-1)";
  logoutBtn.innerHTML = `${svgIcon("logout").outerHTML || ""}<span>Log Out</span>`;
  logoutBtn.addEventListener("click", () => {
    closeNavDrawer();
    setTimeout(() => logout(), 200);
  });
  footer.appendChild(logoutBtn);
  drawer.appendChild(footer);

  // Animate open
  requestAnimationFrame(() => {
    drawer.classList.add("open");
    overlay.classList.add("open");
  });

  overlay.addEventListener("click", closeNavDrawer, { once: true });
}

function closeNavDrawer() {
  const drawer = document.getElementById("navDrawer");
  const overlay = document.getElementById("navOverlay");
  drawer.classList.remove("open");
  overlay.classList.remove("open");
}

function renderHero() {

  let nextValue = "—";
  let nextMeta = "No upcoming payouts";
  if (next) {

    if (d < 0) { nextValue = "Overdue"; nextMeta = `${getFirm(next.firmId)?.name || "—"} · ${fmtDateShort(next.date)}`; }
    else if (d === 0) { nextValue = "Today"; nextMeta = `${getFirm(next.firmId)?.name || "—"} · ${fmtGBP(next.amount)}`; }

function goalBar(name, current, goal, formatter, idx) {
  const hasGoal = goal > 0;
  const pct = hasGoal ? (current / goal) * 100 : 0;
  const visualPct = Math.min(100, pct);
  const complete = pct >= 100 && hasGoal;
  const pctText = !hasGoal ? "—" : (pct >= 1000 ? Math.round(pct) + "%" : pct.toFixed(0) + "%");

  return el("div", { class: "goal-row" + (complete ? " complete" : "") },
    el("div", { class: "goal-meta" },
      el("div", { class: "goal-label" },
        name,
        complete ? el("span", { class: "check" }, "✓") : null
      ),
      el("div", { class: "goal-progress" },
        el("span", { class: "goal-now" }, formatter(current)),
        el("span", { class: "goal-of" }, "of " + formatter(goal)),
        el("span", { class: "goal-pct" }, pctText)

    ),
    el("div", { class: "goal-bar-track" },

/* ----------------------------------------------------------------
   UPCOMING TIMELINE
   ---------------------------------------------------------------- */
function payoutItem(p) {
  const firm = getFirm(p.firmId);
  const days = daysBetween(today(), p.date);
  let cdClass = "later";
  let cdText = `${days}d`;
  if (p.status === "received") { cdClass = "received"; cdText = "Paid"; }
  else if (p.status === "denied") { cdClass = "denied"; cdText = "Denied"; }
  else if (days < 0) { cdClass = "overdue"; cdText = "Overdue"; }
  else if (days === 0) { cdClass = "soon"; cdText = "Today"; }
  else if (days <= 3) { cdClass = "soon"; cdText = `${days} ${days === 1 ? "day" : "days"}`; }
  else if (days <= 7) { cdClass = "this-week"; cdText = `${days} days`; }

  const acct = getAccount(p.accountId);
  const meta = [
    fmtDateShort(p.date),
    el("span", { class: "sep" }, "·"),
    statusLabel(p.status)
  ];
  if (acct) meta.push(el("span", { class: "sep" }, "·"), acct.label);

  return el("button", {
    class: "pay-item",
    onclick: () => openPayoutSheet(p.id)
  },
    el("div", { class: "pay-avatar", style: `background: ${firmAvatar(firm)};` }, firmInitials(firm?.name)),
    el("div", { class: "pay-body" },
      el("div", { class: "pay-firm" }, firm?.name || "Unknown firm"),
      el("div", { class: "pay-meta" }, ...meta)
    ),
    el("div", { class: "pay-right" },
      el("div", { class: "pay-amount" + (p.status === "received" ? " received" : "") }, fmtGBP(p.amount)),
      el("div", { class: "pay-countdown " + cdClass }, cdText)
    )
  );
}

function renderRecent() {
  // Build the search/filter bar — lives inside this card
  const searchSection = renderSearch();

  // Filtered results drive what we show
  const hits = filteredPayouts();
  const isFiltering = searchQuery || searchFilter !== "all";

  // When not filtering, fall back to the standard recent settled list
  const items = isFiltering ? hits : recentSettled();

  let content;
  if (!items.length) {
    content = el("div", { class: "empty" },
      el("div", { class: "empty-icon" }, isFiltering ? "🔍" : "💸"),
      el("div", { class: "empty-title" }, isFiltering ? "No matches" : "No payouts settled yet"),
      el("div", { class: "empty-text" }, isFiltering ? `Nothing matches "${searchQuery || "this filter"}"` : "Once a payout is marked Received or Denied, it'll show up here.")
    );
  } else {
    const timeline = el("div", { class: "timeline stagger" });
    items.slice(0, isFiltering ? 40 : 8).forEach(p => {
      timeline.appendChild(makeSwipeable(
        payoutItem(p),
        () => openPayoutSheet(p.id),
        () => alertSheet({ title: "Delete Payout", body: "Remove this payout? This can't be undone.", buttons: [{ label: "Delete Payout", variant: "danger", action: () => { state.payouts = state.payouts.filter(x => x.id !== p.id); dbDelete("payouts", p.id); saveState(); rerender(); toast("Deleted"); } }] })
      ));
    });

      const more = document.createElement("div");
      more.style.cssText = "text-align:center;color:var(--text-3);font-size:13px;padding:12px 0;";
      more.textContent = `+${items.length - 40} more — narrow your search`;
      timeline.appendChild(more);
    }

  const receivedCount = recentSettled().filter(p => p.status === "received").length;

        el("div", { class: "card-title" }, "Recent Payouts"),
        metaParts.length ? el("div", { class: "section-meta" }, metaParts.join(" · ")) : null

      searchSection,
      content

/* ----------------------------------------------------------------
   CHART
   ---------------------------------------------------------------- */
function renderChart() {
  const data = monthlyEarningsSeries(6);
  const total = data.reduce((s, d) => s + d.total, 0);
  const maxVal = Math.max(1, ...data.map(d => d.total));
  // 15% headroom keeps the tallest bar from kissing the top and leaves room for the value label above
  const scaleMax = maxVal * 1.15;
  const currentIdx = data.length - 1;

  const wrap = document.createElement("div");
  wrap.className = "bar-chart";

  const bars = el("div", { class: "bc-bars" });
  const labels = el("div", { class: "bc-labels" });

  data.forEach((d, i) => {
    const heightPct = d.total > 0 ? (d.total / scaleMax) * 100 : 0;
    const isCurrent = i === currentIdx;
    // Only pulse the current-month bar when there's actually data — pulsing an invisible bar reads as noise.
    const pulseCurrent = isCurrent && d.total > 0;

    const col = el("div", { class: "bc-col" + (isCurrent ? " current" : ""), "data-i": i },
      el("div", { class: "bc-col-value" }, d.total > 0 ? compactGBP(d.total) : "£0"),
      el("div", {
        class: "bc-bar" + (pulseCurrent ? " current" : "") + (d.total === 0 ? " empty" : ""),
        "data-target-height": heightPct.toFixed(2)
      })
    );
    bars.appendChild(col);

    const labelSpan = el("span", { class: isCurrent ? "current" : "" }, d.label);
    labels.appendChild(labelSpan);
  });

  wrap.appendChild(bars);
  wrap.appendChild(labels);

  const tooltip = el("div", { class: "bc-tooltip" });
  wrap.appendChild(tooltip);

  // Hover / touch behaviour: highlight + tooltip
  const cols = wrap.querySelectorAll(".bc-col");
  function showFor(i) {
    const d = data[i];
    const col = cols[i];
    tooltip.innerHTML = `<div class="ttl">${d.label}</div><div class="val num">${fmtGBP(d.total)}</div>`;
    const colRect = col.getBoundingClientRect();
    const wrapRect = wrap.getBoundingClientRect();
    const barEl = col.querySelector(".bc-bar");
    const barRect = barEl.getBoundingClientRect();
    tooltip.style.left = (colRect.left - wrapRect.left + colRect.width / 2) + "px";
    tooltip.style.top  = (barRect.top  - wrapRect.top  - 8) + "px";
    tooltip.classList.add("visible");
    cols.forEach(c => c.classList.remove("hover"));
    col.classList.add("hover");
  }
  function hideAll() {
    tooltip.classList.remove("visible");
    cols.forEach(c => c.classList.remove("hover"));
  }
  cols.forEach((col, i) => {
    col.addEventListener("mouseenter", () => showFor(i));
    col.addEventListener("mouseleave", hideAll);
    col.addEventListener("touchstart", (e) => { e.stopPropagation(); showFor(i); }, { passive: true });
  });
  // Tap elsewhere to dismiss on mobile
  wrap.addEventListener("touchend", () => { setTimeout(hideAll, 1500); }, { passive: true });

  const velocity = payoutVelocity();
  const velClass = velocity > 0 ? "up" : velocity < 0 ? "down" : "flat";
  const velText  = velocity > 0 ? `↑ ${velocity}%` : velocity < 0 ? `↓ ${Math.abs(velocity)}%` : "→ steady";
  const velBadge = el("span", { class: `velocity-badge ${velClass}` }, velText);

  return el("section", { class: "section" },
    el("div", { class: "card" },
      el("div", { class: "card-header" },
        el("div", { class: "card-title" }, "Monthly Earnings"),
        el("div", { style: "display:flex;align-items:center;gap:8px;" },
          velBadge,
          el("div", { class: "section-meta" }, fmtGBP(total, { short: true }))
        )
      ),
      wrap
    )
  );
}

/* ----------------------------------------------------------------
   CALENDAR
   ---------------------------------------------------------------- */
function renderCalendar() {
  if (!state.ui.calendarMonth) {
    state.ui.calendarMonth = today().slice(0, 7);
  }
  const [year, month] = state.ui.calendarMonth.split("-").map(Number);
  const first = new Date(year, month - 1, 1);
  const last = new Date(year, month, 0);
  const startWeekday = (first.getDay() + 6) % 7; // Mon=0

  const cells = [];
  // leading blanks (previous month)
  for (let i = startWeekday - 1; i >= 0; i--) {
    const d = new Date(year, month - 1, -i);
    cells.push({ date: d, otherMonth: true });
  }
  // this month
  for (let d = 1; d <= last.getDate(); d++) {
    cells.push({ date: new Date(year, month - 1, d), otherMonth: false });
  }
  // trailing blanks
  while (cells.length % 7 !== 0) {
    const d = new Date(cells[cells.length - 1].date);
    d.setDate(d.getDate() + 1);
    cells.push({ date: d, otherMonth: true });
  }
  // make sure we have 6 rows for layout stability (optional)
  while (cells.length < 42) {
    const d = new Date(cells[cells.length - 1].date);
    d.setDate(d.getDate() + 1);
    cells.push({ date: d, otherMonth: true });
  }

  const grid = el("div", { class: "cal-grid" });
  cells.forEach(cell => {
    const iso = localISO(cell.date);
    const dayPayouts = state.payouts.filter(p => p.date === iso);
    const cls = ["cal-day"];
    if (cell.otherMonth) cls.push("other-month");
    if (iso === today()) cls.push("today");

    // Decide which "primary" amount to show:
    //   received total if any received, else pending total, else denied total
    const receivedPays  = dayPayouts.filter(p => p.status === "received");
    const pendingPays   = dayPayouts.filter(p => p.status === "awaiting_approval");
    const deniedPays    = dayPayouts.filter(p => p.status === "denied");

    let amount = 0, amountClass = "";
    if (receivedPays.length) {
      amount = receivedPays.reduce((s, p) => s + Number(p.amount), 0);
      amountClass = "received";
      cls.push("has-received");
    } else if (pendingPays.length) {
      amount = pendingPays.reduce((s, p) => s + Number(p.amount), 0);
      amountClass = "pending";
      cls.push("has-pending");
    } else if (deniedPays.length) {
      amount = deniedPays.reduce((s, p) => s + Number(p.amount), 0);
      amountClass = "denied";
    }

    // Status dots (one per distinct status)
    const dots = el("div", { class: "cal-dots" });
    const seen = new Set();
    dayPayouts.forEach(p => {
      if (seen.has(p.status)) return;
      seen.add(p.status);
      dots.appendChild(el("div", { class: "cal-dot " + p.status }));
    });

    const amountEl = el("div", { class: "cal-day-amount " + amountClass },
      amount > 0 ? compactGBP(amount) : ""
    );

    const dayEl = el("button", {
      class: cls.join(" "),
      onclick: () => { if (!cell.otherMonth) openDaySheet(iso); }
    },
      el("div", { class: "cal-day-num" }, cell.date.getDate().toString()),
      amountEl,
      el("div", { class: "cal-dots" },
        ...Array.from(dots.children),
        journalForDate(iso) ? el("div", { class: "cal-dot", style: "background:var(--lav-1);opacity:0.7;" }) : null
      )
    );
    grid.appendChild(dayEl);
  });

  return el("section", { class: "section" },
    el("div", { class: "card" },
      el("div", { class: "card-header" },
        el("div", { class: "card-title" }, "Payout Calendar"),
        el("div", { class: "cal-nav" },
          el("button", { class: "cal-nav-btn", onclick: () => { shiftMonth(-1); rerender(); } }, svgIcon("chevL")),
          el("button", { class: "cal-nav-btn", onclick: () => { state.ui.calendarMonth = today().slice(0, 7); saveState(); rerender(); } },
            el("span", { style: "font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;" }, "Today")),
          el("button", { class: "cal-nav-btn", onclick: () => { shiftMonth(1); rerender(); } }, svgIcon("chevR"))
        )
      ),
      el("div", { class: "cal-month" }, first.toLocaleDateString("en-GB", { month: "long", year: "numeric" })),
      el("div", { class: "cal-weekdays" },
        ...["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d => el("span", {}, d))
      ),
      grid,
      el("div", { class: "cal-legend" },
        el("div", { class: "cal-legend-item" }, el("span", { class: "cal-legend-dot", style: "background:var(--jade-1);" }), "Received"),
        el("div", { class: "cal-legend-item" }, el("span", { class: "cal-legend-dot", style: "background:var(--amber-1);" }), "Awaiting"),
        el("div", { class: "cal-legend-item" }, el("span", { class: "cal-legend-dot", style: "background:var(--rose-1);" }), "Denied"),
        el("div", { class: "cal-legend-item" }, el("span", { class: "cal-legend-dot", style: "background:var(--lav-1);opacity:0.7;" }), "Note")
      )
    )
  );
}

function shiftMonth(delta) {
  const [y, m] = state.ui.calendarMonth.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  state.ui.calendarMonth = localMonthISO(d);
  saveState();
}

function renderPassRateSection() {
  const pr = accountPassRate();
  const fees = challengeFees();
  const roi = feeROI();

  if (!pr && !fees) {
    return el("div", { class: "card" },
      el("div", { class: "card-header" }, el("div", { class: "card-title" }, "Challenge Analytics")),
      el("div", { class: "empty-state" },
        el("div", { class: "empty-state-icon", style: "color:var(--jade-1);" }, "🎯"),
        el("div", { class: "empty-state-title" }, "Track your pass rate"),
        el("div", { class: "empty-state-sub" }, "Add accounts and mark them as Funded or Failed to see your challenge pass rate and fee ROI."),
        el("button", { class: "btn primary", style: "font-size:13px;padding:10px 20px;", onclick: () => navigateTo("firms") }, "Manage accounts")
      )
    );
  }

  const items = [];

  if (pr) {
    const circumference = 2 * Math.PI * 22;
    const offset = circumference - (pr.rate / 100) * circumference;
    const circleWrap = el("div", { class: "pass-rate-circle" });
    circleWrap.innerHTML = `<svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="22" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3"/><circle cx="24" cy="24" r="22" fill="none" stroke="var(--jade-2)" stroke-width="3" stroke-dasharray="${circumference.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}" stroke-linecap="round" style="transition:stroke-dashoffset 1.2s var(--ease-out);"/></svg><div class="pass-rate-circle-text num">${pr.rate}%</div>`;
    items.push(
      el("div", { class: "pass-rate-visual" },
        circleWrap,
        el("div", { class: "pass-rate-info" },
          el("div", { class: "pass-rate-label" }, "Challenge Pass Rate"),
          el("div", { class: "pass-rate-detail" }, `${pr.passed} funded · ${pr.failed} failed · ${pr.total} total`)
        )
      )
    );
  }

  if (fees > 0) {
    const net = netProfit();
    const roiText = roi != null ? ((roi >= 0 ? "+" : "") + roi.toFixed(0) + "% ROI") : "—";
    const roiColor = net >= 0 ? "var(--jade-1)" : "var(--rose-1)";
    items.push(
      el("div", { class: "pass-rate-visual" },
        (() => {
          const d = el("div", { class: "pass-rate-circle", style: "width:60px;height:60px;" });
          d.innerHTML = `<div style="font-size:18px;font-weight:800;color:${roiColor};letter-spacing:-0.04em;position:relative;z-index:1;">${roiText.split(" ")[0]}</div>`;
          return d;
        })(),
        el("div", { class: "pass-rate-info" },
          el("div", { class: "pass-rate-label" }, "Fee ROI"),
          el("div", { class: "pass-rate-detail" },
            `${fmtGBP(lifetimeWithdrawals(), { short: true })} withdrawn vs ${fmtGBP(fees, { short: true })} in fees — `,
            el("span", { style: `color:${roiColor};font-weight:600;` }, `${net >= 0 ? "+" : "−"}${fmtGBP(Math.abs(net), { short: true })} net`)
          )
        )
      )
    );
  }

  return el("div", { class: "card" },
    el("div", { class: "card-header" }, el("div", { class: "card-title" }, "Challenge Analytics")),
    ...items
  );
}

function renderOvKPI() {
  const lifetime = lifetimeWithdrawals();
  const spend = lifetimeSpend();
  const net = netProfit();
  const pr = accountPassRate();
  const streak = withdrawalStreak();
  const avg = avgPayout();
  const activeFirms = state.firms.length;
  const fees = challengeFees();
  const roi = fees > 0 ? ((lifetime - fees) / fees) * 100 : null;

  const netSign = net >= 0 ? "+" : "−";
  const netClass = net > 0 ? "pos" : net < 0 ? "neg" : "";
  const roiClass = roi === null ? "" : roi >= 0 ? "pos" : "neg";

  const kpis = [
    { label: "Total Payouts", value: fmtGBP(lifetime, { short: lifetime >= 1000 }), sub: `${received().length} withdrawals`, cls: "" },
    { label: "Total Spend", value: fmtGBP(spend, { short: spend >= 1000 }), sub: "fees & purchases", cls: spend > 0 ? "neg" : "" },
    { label: "Net P&L", value: (net !== 0 || lifetime > 0 || spend > 0) ? netSign + fmtGBP(Math.abs(net), { short: Math.abs(net) >= 1000 }) : "—", sub: "payouts minus costs", cls: netClass },
    { label: "Fee ROI", value: roi !== null ? (roi >= 0 ? "+" : "") + roi.toFixed(0) + "%" : "—", sub: "return on challenge fees", cls: roiClass },
    { label: "Pass Rate", value: pr ? pr.rate + "%" : "—", sub: pr ? `${pr.passed}/${pr.total} accounts` : "no data yet", cls: "lav" },
    { label: "Streak", value: streak > 0 ? `${streak} mo` : "—", sub: "consecutive months", cls: "" },
    { label: "Avg Payout", value: avg > 0 ? fmtGBP(avg, { short: avg >= 1000 }) : "—", sub: "per withdrawal", cls: "" },
    { label: "Firms", value: activeFirms > 0 ? String(activeFirms) : "—", sub: `${state.accounts.length} account${state.accounts.length !== 1 ? "s" : ""}`, cls: "" },
  ];

  const strip = el("div", { class: "kpi-strip" });
  kpis.forEach(({ label, value, sub, cls }) => {
    strip.appendChild(
      el("div", { class: "kpi-item" },
        el("div", { class: "kpi-label" }, label),
        el("div", { class: `kpi-value${cls ? " " + cls : ""}` }, value),
        el("div", { class: "kpi-sub" }, sub)
      )
    );
  });
  return strip;
}

function renderOvHero() {
  const lifetime = lifetimeWithdrawals();
  const spend = lifetimeSpend();
  const net = netProfit();
  const monthVal = earnedThisMonth();
  const delta = pctDeltaMonthOverMonth();
  const pr = accountPassRate();
  const activeAccts = state.accounts.filter(a => a.health === "active").length;

  const noData = lifetime === 0 && spend === 0;
  const netSign = net >= 0 ? "+" : "−";
  const netAmtClass = net > 0 ? "pos" : net < 0 ? "neg" : "neutral";

  let deltaEl = null;
  if (!noData && (monthVal > 0 || earnedLastMonth() > 0)) {
    const d = delta;
    const cls = d > 0 ? "pos" : d < 0 ? "neg" : "flat";
    const txt = d > 0 ? `↑ ${d.toFixed(0)}%` : d < 0 ? `↓ ${Math.abs(d).toFixed(0)}%` : "0%";
    deltaEl = el("span", { class: "ov-hero-delta " + cls }, txt);
  }

  const heroCard = el("div", { class: "ov-hero" });

  const top = el("div", { class: "ov-hero-top" });

  // Left: big number + label
  const left = el("div", {});

    el("div", { class: `ov-hero-amount num ${netAmtClass}` },

  );

  left.appendChild(amountLine);
  left.appendChild(
    el("div", { class: "ov-hero-meta" },
      noData
        ? "Add a payout and spending to start tracking"

    )
  );
  top.appendChild(left);

  // Right: mini stat pills

  [

function renderPageSettings(app) {
  // Render settings as a card-based page (reuses openSettingsSheet logic but inline)
  const session = getSession();
  const g = state.profile.goals;

  function moneyInput(key, placeholder) {
    return el("div", { class: "input-prefix-wrap" },
      el("span", { class: "prefix" }, _sym()),
      el("input", {
        class: "input num", type: "number", inputmode: "decimal", min: "0",
        placeholder, value: g[key] || "",
        oninput: (e) => { g[key] = parseFloat(e.target.value) || 0; saveState(); rerender(); }
      })
    );
  }

  // Username save helper (async uniqueness check)
  let _usernameSaveEl = null;
  let _usernameErrEl  = null;
  async function saveUsername(val) {
    const usernameInput = _usernameSaveEl;
    const usernameErr   = _usernameErrEl;
    if (usernameErr) usernameErr.textContent = "";
    const normalized = val.toLowerCase().replace(/[^a-z0-9_]/g, "");
    if (normalized !== val) {
      if (usernameInput) usernameInput.value = normalized;
    }
    if (!normalized) {
      state.profile.username = "";
      saveState();
      return;
    }
    if (normalized === state.profile.username) return;
    if (_currentUser) {
      const { data } = await supabase
        .from("profiles").select("id")
        .eq("username", normalized)
        .neq("id", _currentUser.id)
        .limit(1);
      if (data && data.length > 0) {
        if (usernameErr) usernameErr.textContent = `"${normalized}" is already taken — try another.`;
        toast(`"${normalized}" is already taken — try another`);
        return;
      }
    }
    state.profile.username = normalized;
    saveState();
    toast("Username saved");
  }

  const usernameInput = el("input", {
    class: "input", type: "text", placeholder: "e.g. traderJoe (optional)",
    value: state.profile.username || "",
    oninput: (e) => {
      e.target.value = e.target.value.replace(/[^a-zA-Z0-9_]/g, "");
      if (_usernameErrEl) _usernameErrEl.textContent = "";
    }
  });
  const usernameErrEl = el("div", { style: "font-size:12px;color:#f87171;margin-top:4px;min-height:16px;" });
  _usernameSaveEl = usernameInput;
  _usernameErrEl  = usernameErrEl;
  usernameInput.addEventListener("blur", () => saveUsername(usernameInput.value.trim()));

  function readOnlyField(label, value) {
    return el("div", { class: "field" },
      el("label", { class: "field-label" }, label),
      el("div", {
        class: "input",
        style: "background:var(--surface-2,#222);color:var(--text-2);cursor:default;user-select:text;"

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(renderTop());
  // Sidebar and bottom nav are rendered once; subsequent renders just update active classes
  if (!document.getElementById("sidebar")?.hasChildNodes()) renderSidebar();
  if (!document.getElementById("bottomNav")?.hasChildNodes()) renderBottomNav();

  // Add page-enter animation wrapper
  const content = document.createElement("div");
  content.className = "page-enter";

  // Dispatch to the correct page renderer
  const pageApp = { appendChild: (el) => app.appendChild(el) };
  switch (currentPage) {
    case "dashboard":  renderPageDashboard(pageApp);  break;
    case "payouts":    renderPagePayouts(pageApp);    break;
    case "analytics":  renderPageAnalytics(pageApp);  break;
    case "finance":    renderPageAnalytics(pageApp);  break; // legacy redirect
    case "firms":      renderPageFirms(pageApp);      break;
    case "milestones": renderPageMilestones(pageApp); break;
    case "calendar":   renderPageCalendar(pageApp);   break;
    case "stats":      renderPageStats(pageApp);      break;
    case "settings":   renderPageSettings(pageApp);   break;
    default:           renderPageDashboard(pageApp);
  }

  // Trigger animations on next frame
  requestAnimationFrame(() => {
    document.querySelectorAll(".goal-bar-fill[data-target-width]").forEach(f => {
      f.style.width = f.getAttribute("data-target-width") + "%";
    });
    document.querySelectorAll(".ov-goal-bar-fill[data-ov-goal-pct]").forEach(f => {
      f.style.width = f.getAttribute("data-ov-goal-pct") + "%";
    });
    document.querySelectorAll(".bc-bar[data-target-height]").forEach(b => {
      b.style.height = b.getAttribute("data-target-height") + "%";
    });
  });
}

function rerender() {
  // Light re-render that doesn't restart hero animations
  render();
}

/* ================================================================
   NUMBER COUNT-UP
   ================================================================ */
function animateNumber(node) {
  if (node.dataset.animated === "1") return;
  node.dataset.animated = "1";
  const target = parseFloat(node.dataset.count);
  if (isNaN(target)) return;

  // We don't animate the whole hero amount text directly because of the £/pence split;
  // instead just leave it static — animations of just the percentage looks cleaner.
  if (!node.classList.contains("ring-percent")) return;

  const duration = 1100;
  const start = performance.now();
  const ease = (t) => 1 - Math.pow(1 - t, 3);
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    const v = target * ease(t);
    node.textContent = Math.round(v) + "%";
    if (t < 1) requestAnimationFrame(step);
    else node.textContent = Math.round(target) + "%";
  }
  node.textContent = "0%";
  requestAnimationFrame(step);
}

/* ================================================================
   SHEETS / MODALS
   ================================================================ */
const scrim = document.getElementById("scrim");
const sheet = document.getElementById("sheet");
const sheetContent = document.getElementById("sheetContent");

function openSheet(contentBuilder) {
  sheetContent.innerHTML = "";
  sheetContent.appendChild(contentBuilder());
  scrim.classList.add("open");
  // small delay so animation triggers cleanly
  requestAnimationFrame(() => sheet.classList.add("open"));
  document.body.style.overflow = "hidden";
}
function closeSheet() {
  sheet.classList.remove("open");
  scrim.classList.remove("open");
  document.body.style.overflow = "";
}
scrim.addEventListener("click", closeSheet);
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeSheet(); });

function sheetHead(title, onClose) {
  return el("div", { class: "sheet-head" },
    el("div", { class: "sheet-title" }, title),
    el("button", { class: "sheet-close", onclick: onClose || closeSheet }, svgIcon("close"))
  );
}

/* ----------------------------------------------------------------
   PAYOUT SHEET
   ---------------------------------------------------------------- */
function openPayoutSheet(payoutId, opts = {}) {
  const editing = payoutId ? state.payouts.find(p => p.id === payoutId) : null;
  if (!editing && _tier === "free" && state.payouts.length >= FREE_PAYOUTS) {
    showUpgradePrompt("More than " + FREE_PAYOUTS + " payouts");
    return;
  }

  // For new payouts, default to the first firm that has at least one account,
  // so the user lands on a workable state instead of immediately hitting the empty-account prompt.
  let defaultFirmId = state.firms[0]?.id || "";
  if (!editing) {
    const firmWithAccounts = state.firms.find(f => accountsForFirm(f.id).length > 0);
    if (firmWithAccounts) defaultFirmId = firmWithAccounts.id;
  }

  // opts.prefill is used by the Duplicate action — seeds a new draft with copied values
  const prefill = opts.prefill || null;

  const draft = editing ? { ...editing } : prefill ? { ...prefill } : {
    id: uid(),
    firmId: defaultFirmId,
    accountId: "",
    amount: "",
    date: opts.date || today(),
    status: "awaiting_approval",
    notes: ""
  };
  // Auto-select the first account of the chosen firm if none picked yet
  if (!editing && draft.firmId && !draft.accountId) {
    const accts = accountsForFirm(draft.firmId);
    if (accts.length) draft.accountId = accts[0].id;
  }

  openSheet(() => {
    const root = document.createElement("div");
    root.appendChild(sheetHead(editing ? "Edit Payout" : "Add Payout"));

    const body = el("div", { class: "sheet-body" });

    // If no firms yet, force the user to add one first
    if (!state.firms.length) {
      body.appendChild(el("div", { class: "empty", style: "padding:14px 0;" },
        el("div", { class: "empty-icon" }, "🏛"),
        el("div", { class: "empty-title" }, "Add a firm first"),
        el("div", { class: "empty-text" }, "Payouts are linked to firms — let's add one so we can attribute this payout correctly."),
        el("button", { class: "empty-btn", onclick: () => { closeSheet(); setTimeout(() => openFirmSheet(), 200); } }, "Add firm")
      ));
      root.appendChild(body);
      return root;
    }

    // Firm
    const firmSel = el("select", { class: "select" },
      ...state.firms.map(f => {
        const opt = document.createElement("option");
        opt.value = f.id;
        opt.textContent = f.name;
        if (draft.firmId === f.id) opt.selected = true;
        return opt;
      })
    );
    firmSel.addEventListener("change", () => {
      draft.firmId = firmSel.value;
      draft.accountId = "";
      refreshAccountSel();
    });

    // Account (filtered by firm) — REQUIRED. If firm has no accounts, show an inline prompt.
    const accountWrap = el("div", { class: "field" });
    function refreshAccountSel() {
      accountWrap.innerHTML = "";
      const accts = accountsForFirm(draft.firmId);
      accountWrap.appendChild(el("label", { class: "field-label" }, "Account"));

      if (!accts.length) {
        // Inline empty-state with a single-tap "Add account" path
        accountWrap.appendChild(el("div", { class: "inline-warn" },
          el("div", { class: "inline-warn-text" },
            el("strong", {}, "No accounts under this firm yet."),
            el("div", { style: "margin-top:3px;font-weight:400;opacity:0.85;" }, "Each payout has to be tied to an account.")
          ),
          el("button", {
            class: "inline-warn-btn",
            type: "button",
            onclick: () => {
              const firmIdForAccount = draft.firmId;
              closeSheet();
              // After the account is added, the user can come back and add the payout.
              setTimeout(() => openAccountSheet(null, firmIdForAccount), 200);
            }
          }, "Add account")
        ));
        return;
      }

      // Make sure the draft account belongs to this firm; if not, pick the first one
      if (!draft.accountId || !accts.find(a => a.id === draft.accountId)) {
        draft.accountId = accts[0].id;
      }

      const sel = el("select", { class: "select" });
      accts.forEach(a => {
        const o = document.createElement("option");
        o.value = a.id;
        o.textContent = `${a.label} · ${healthLabel(a.health)}`;
        if (draft.accountId === a.id) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener("change", () => draft.accountId = sel.value);
      accountWrap.appendChild(sel);
    }
    refreshAccountSel();

    // Amount + Date
    const amountWrap = el("div", { class: "input-prefix-wrap" },
      el("span", { class: "prefix" }, "£"),
      el("input", {
        class: "input num", type: "number", inputmode: "decimal", step: "0.01", min: "0",
        placeholder: "0.00",
        value: draft.amount,
        oninput: (e) => draft.amount = e.target.value
      })
    );

    const dateInput = el("input", {
      class: "input", type: "date", value: draft.date,
      oninput: (e) => draft.date = e.target.value
    });

    // Status chips
    const statusRow = el("div", { class: "chip-row" });
    function rebuildStatusChips() {
      statusRow.innerHTML = "";
      PAYOUT_STATUSES.forEach(s => {
        const c = el("button", {
          class: "chip" + (draft.status === s.id ? " active" : ""),
          type: "button",
          onclick: () => { draft.status = s.id; rebuildStatusChips(); }
        }, s.label);
        statusRow.appendChild(c);
      });
    }
    rebuildStatusChips();

    body.appendChild(el("div", { class: "field" },
      el("label", { class: "field-label" }, "Firm"),
      firmSel
    ));
    body.appendChild(accountWrap);
    body.appendChild(el("div", { class: "field-row" },
      el("div", { class: "field" },
        el("label", { class: "field-label" }, "Amount (GBP)"),
        amountWrap
      ),
      el("div", { class: "field" },
        el("label", { class: "field-label" }, "Date"),
        dateInput
      )
    ));
    body.appendChild(el("div", { class: "field" },
      el("label", { class: "field-label" }, "Status"),
      statusRow
    ));
    body.appendChild(el("div", { class: "field" },
      el("label", { class: "field-label" }, "Notes (optional)"),
      el("textarea", {
        class: "textarea",
        placeholder: "Reason for delay, batch number, anything useful…",
        oninput: (e) => draft.notes = e.target.value
      }, draft.notes || "")
    ));
    root.appendChild(body);

    // Footer
    const foot = el("div", { class: "sheet-foot" });
    if (editing) {
      foot.appendChild(el("button", { class: "btn danger", onclick: () => {
        alertSheet({ title: "Delete Payout", body: "Remove this payout? This can't be undone.", buttons: [{ label: "Delete Payout", variant: "danger", action: () => {
          state.payouts = state.payouts.filter(p => p.id !== editing.id);
          dbDelete("payouts", editing.id);
          saveState();
          closeSheet();
          rerender();
          toast("Payout deleted");
        }}] });
      } }, "Delete"));
      // Duplicate — copies the payout with a new id, pre-set to today, re-opens the sheet
      foot.appendChild(el("button", { class: "btn-duplicate", onclick: () => {
        closeSheet();
        setTimeout(() => openPayoutSheet(null, {
          prefill: { ...editing, id: uid(), date: today(), status: "awaiting_approval" }
        }), 200);
      } }, "⎘ Duplicate"));
    }
    foot.appendChild(el("button", { class: "btn ghost", onclick: closeSheet }, "Cancel"));
    foot.appendChild(el("button", { class: "btn primary", onclick: () => {
      const amount = parseFloat(draft.amount);
      if (!draft.firmId) return toast("Pick a firm");
      if (!draft.accountId) return toast("Pick an account for this payout");
      if (isNaN(amount) || amount < 0) return toast("Enter a valid amount");
      if (!draft.date) return toast("Pick a date");

      const final = { ...draft, amount };
      if (editing) {
        state.payouts = state.payouts.map(p => p.id === editing.id ? final : p);
      } else {
        state.payouts.push(final);
      }
      saveState();
      closeSheet();
      rerender();
      toast(editing ? "Payout updated" : "Payout added");
    } }, editing ? "Save" : "Add payout"));
    root.appendChild(foot);

    return root;
  });
}

/* ----------------------------------------------------------------
   FIRM SHEET
   ---------------------------------------------------------------- */
function openFirmSheet(firmId) {
  const editing = firmId ? getFirm(firmId) : null;
  if (!editing && _tier === "free" && state.firms.length >= FREE_FIRMS) {
    showUpgradePrompt("More than " + FREE_FIRMS + " firms");
    return;
  }
  const draft = editing ? { ...editing } : { id: uid(), name: "" };

  openSheet(() => {
    const root = document.createElement("div");
    root.appendChild(sheetHead(editing ? "Edit Firm" : "Add Firm"));

    const body = el("div", { class: "sheet-body" });

    // Firm picker: dropdown of popular firms + "Other (custom name)" option that reveals a text input.
    // If editing a firm whose name isn't in the popular list, "Other" is pre-selected and the input is pre-filled.
    const isPopular = POPULAR_FIRMS.includes(draft.name);
    const startsCustom = !!draft.name && !isPopular;

    const firmSelect = el("select", { class: "select" });
    const placeholderOpt = document.createElement("option");
    placeholderOpt.value = ""; placeholderOpt.textContent = "Select a firm…";
    firmSelect.appendChild(placeholderOpt);
    POPULAR_FIRMS.forEach(name => {
      const o = document.createElement("option");
      o.value = name; o.textContent = name;
      if (draft.name === name) o.selected = true;
      firmSelect.appendChild(o);
    });
    const otherOpt = document.createElement("option");
    otherOpt.value = "__custom__"; otherOpt.textContent = "Other (enter your own)…";
    if (startsCustom) otherOpt.selected = true;
    firmSelect.appendChild(otherOpt);

    const customWrap = el("div", { style: "margin-top:8px; display:" + (startsCustom ? "block" : "none") + ";" },
      el("input", {
        class: "input", type: "text", placeholder: "Enter firm name",
        value: startsCustom ? draft.name : "",
        oninput: (e) => { draft.name = e.target.value; }
      })
    );

    firmSelect.addEventListener("change", () => {
      if (firmSelect.value === "__custom__") {
        customWrap.style.display = "block";
        const input = customWrap.querySelector("input");
        draft.name = input.value;
        setTimeout(() => input.focus(), 50);
      } else {
        customWrap.style.display = "none";
        draft.name = firmSelect.value;
      }
    });

    body.appendChild(el("div", { class: "field" },
      el("label", { class: "field-label" }, "Firm"),
      firmSelect,
      customWrap
    ));

    // Accounts management inside firm sheet (when editing).
    // Account-level health is shown via each chip's color — firms themselves no longer have a health badge.
    if (editing) {
      const accts = accountsForFirm(editing.id);
      const acctSection = el("div", { class: "field" },
        el("label", { class: "field-label" }, `Accounts (${accts.length})`),
        el("div", { class: "firm-accounts", style: "margin-top:0;" },
          ...accts.map(a => el("button", {
            class: "account-chip " + a.health,
            onclick: () => { closeSheet(); setTimeout(() => openAccountSheet(a.id), 200); }
          },
            el("span", { class: "dot" }),
            a.label,
            el("span", { style: "color:var(--text-2);margin-left:5px;font-size:10px;font-weight:500;" }, healthLabel(a.health))
          )),
          el("button", {
            class: "account-chip add",
            onclick: () => { closeSheet(); setTimeout(() => openAccountSheet(null, editing.id), 200); }
          }, "+ Account")
        )
      );
      body.appendChild(acctSection);
    }

    root.appendChild(body);

    const foot = el("div", { class: "sheet-foot" });
    if (editing) {
      foot.appendChild(el("button", { class: "btn danger", onclick: () => {
        const accts = accountsForFirm(editing.id).length;
        const pays = payoutsForFirm(editing.id).length;
        let msg = `Remove "${editing.name}"?`;
        if (accts || pays) msg += ` This will also delete ${[accts && `${accts} account${accts === 1 ? "" : "s"}`, pays && `${pays} payout${pays === 1 ? "" : "s"}`].filter(Boolean).join(" and ")}.`;
        alertSheet({ title: "Delete Firm", body: msg, buttons: [{ label: "Delete Firm", variant: "danger", action: () => {
          const fid = editing.id;
          // Explicitly delete payouts from Supabase (schema is ON DELETE SET NULL, not cascade)
          state.payouts.filter(p => p.firmId === fid).forEach(p => dbDelete("payouts", p.id));
          state.firms    = state.firms.filter(f => f.id !== fid);
          state.accounts = state.accounts.filter(a => a.firmId !== fid);
          state.payouts  = state.payouts.filter(p => p.firmId !== fid);
          // Clear orphaned FK reference in spending (firm_id set null by Supabase cascade)
          state.spending = state.spending.map(s => s.firmId === fid ? { ...s, firmId: "" } : s);
          dbDelete("firms", fid); // Supabase cascade deletes accounts
          saveState();
          closeSheet();
          rerender();
          toast("Firm deleted");
        }}]});
      } }, "Delete"));
    }
    foot.appendChild(el("button", { class: "btn ghost", onclick: closeSheet }, "Cancel"));
    foot.appendChild(el("button", { class: "btn primary", onclick: () => {
      const name = (draft.name || "").trim();
      if (!name) return toast("Pick or enter a firm name");
      // Prevent duplicate firms by name (case-insensitive), except when editing the same firm
      const dupe = state.firms.find(f => f.name.toLowerCase() === name.toLowerCase() && (!editing || f.id !== editing.id));
      if (dupe) return toast(`"${name}" is already in your roster`);
      const final = { id: draft.id, name };
      if (editing) {
        state.firms = state.firms.map(f => f.id === editing.id ? final : f);
      } else {
        state.firms.push(final);
      }
      saveState();
      closeSheet();
      rerender();
      toast(editing ? "Firm updated" : "Firm added");
    } }, editing ? "Save" : "Add firm"));
    root.appendChild(foot);

    return root;
  });
}

          class: "chip" + (draft.health === s.id ? " active" : ""),
          type: "button",
          onclick: () => { draft.health = s.id; rebuildHealthChips(); }
        }, `${s.icon}  ${s.label}`);
        healthChips.appendChild(c);
      });
    }
    rebuildHealthChips();

    body.appendChild(el("div", { class: "field" },
      el("label", { class: "field-label" }, "Status"),
      healthChips
    ));
    root.appendChild(body);

    const foot = el("div", { class: "sheet-foot" });
    if (editing) {
      foot.appendChild(el("button", { class: "btn danger", onclick: () => {
        alertSheet({ title: "Delete Account", body: `Remove "${editing.label}"? Payouts linked to this account will be kept but unlinked.`, buttons: [{ label: "Delete Account", variant: "danger", action: () => {
          const aid = editing.id;
          state.accounts = state.accounts.filter(a => a.id !== aid);
          state.payouts  = state.payouts.map(p => p.accountId === aid ? { ...p, accountId: "" } : p);
          // Clear orphaned FK in spending (account_id set null by Supabase cascade)
          state.spending = state.spending.map(s => s.accountId === aid ? { ...s, accountId: "" } : s);
          dbDelete("accounts", aid);
          saveState();
          closeSheet();
          rerender();
          toast("Account deleted");
        }}]});
      } }, "Delete"));
    }
    foot.appendChild(el("button", { class: "btn ghost", onclick: closeSheet }, "Cancel"));
    foot.appendChild(el("button", { class: "btn primary", onclick: () => {
      if (!draft.label.trim()) return toast("Give the account a label");
      if (!draft.firmId) return toast("Pick a firm");
      if (!draft.health) return toast("Select a status — Funded, In Progress, or Failed");
      const final = { ...draft, label: draft.label.trim() };
      if (editing) {
        state.accounts = state.accounts.map(a => a.id === editing.id ? final : a);
      } else {
        state.accounts.push(final);
      }
      saveState();
      closeSheet();
      rerender();
      toast(editing ? "Account updated" : "Account added");
    } }, editing ? "Save" : "Add account"));
    root.appendChild(foot);

    return root;
  });
}

function openSpendingSheet(spendId) {
  const editing = spendId ? state.spending.find(s => s.id === spendId) : null;
  const draft = editing ? { ...editing } : {
    id: uid(),
    amount: "",
    date: today(),
    category: "account_purchase",
    firmId: "",
    accountId: "",
    notes: ""
  };

  openSheet(() => {
    const root = document.createElement("div");
    root.appendChild(sheetHead(editing ? "Edit Cost" : "Add Cost"));
    const body = el("div", { class: "sheet-body" });

    // Category chips
    const catChips = el("div", { class: "chip-row" });
    function rebuildCatChips() {
      catChips.innerHTML = "";
      SPENDING_CATEGORIES.forEach(c => {
        const chip = el("button", {
          class: "chip" + (draft.category === c.id ? " active" : ""),
          type: "button",
          onclick: () => { draft.category = c.id; rebuildCatChips(); }
        }, `${c.icon}  ${c.label}`);
        catChips.appendChild(chip);
      });
    }
    rebuildCatChips();

    body.appendChild(el("div", { class: "field" },
      el("label", { class: "field-label" }, "Category"),
      catChips
    ));

    // Amount + Date
    body.appendChild(el("div", { class: "field-row" },
      el("div", { class: "field" },
        el("label", { class: "field-label" }, "Amount (GBP)"),
        el("div", { class: "input-prefix-wrap" },
          el("span", { class: "prefix" }, "£"),
          el("input", {
            class: "input num", type: "number", inputmode: "decimal", step: "0.01", min: "0",
            placeholder: "0.00",
            value: draft.amount,
            oninput: (e) => draft.amount = e.target.value
          })
        )
      ),
      el("div", { class: "field" },
        el("label", { class: "field-label" }, "Date"),
        el("input", {
          class: "input", type: "date", value: draft.date,
          oninput: (e) => draft.date = e.target.value
        })
      )
    ));

    // Firm (optional) + Account (filtered, optional)
    if (state.firms.length) {
      const accountWrap = el("div", { class: "field" });

      function refreshCostAccountSel() {
        accountWrap.innerHTML = "";
        accountWrap.appendChild(el("label", { class: "field-label" }, "Account (optional)"));
        const accts = draft.firmId ? accountsForFirm(draft.firmId) : [];
        if (!accts.length) {
          draft.accountId = "";
          return;
        }
        const sel = el("select", { class: "select" });
        const noneOpt = document.createElement("option");
        noneOpt.value = ""; noneOpt.textContent = "— No specific account —";
        sel.appendChild(noneOpt);
        accts.forEach(a => {
          const o = document.createElement("option");
          o.value = a.id;
          o.textContent = `${a.label} · ${healthLabel(a.health)}`;
          if (draft.accountId === a.id) o.selected = true;
          sel.appendChild(o);
        });
        sel.addEventListener("change", () => draft.accountId = sel.value);
        accountWrap.appendChild(sel);
      }

      const firmSel = el("select", { class: "select" });
      const noneOpt = document.createElement("option");
      noneOpt.value = ""; noneOpt.textContent = "— No specific firm —";
      firmSel.appendChild(noneOpt);
      state.firms.forEach(f => {
        const o = document.createElement("option");
        o.value = f.id; o.textContent = f.name;
        if (draft.firmId === f.id) o.selected = true;
        firmSel.appendChild(o);
      });
      firmSel.addEventListener("change", () => {
        draft.firmId = firmSel.value;
        draft.accountId = "";
        refreshCostAccountSel();
      });

      body.appendChild(el("div", { class: "field" },
        el("label", { class: "field-label" }, "Firm (optional)"),
        firmSel
      ));

      refreshCostAccountSel();
      body.appendChild(accountWrap);
    }

    // Description
    body.appendChild(el("div", { class: "field" },
      el("label", { class: "field-label" }, "Description (optional)"),
      el("input", {
        class: "input", type: "text",
        placeholder: "e.g. 50K Combine, TradingView Pro, Wire transfer",
        value: draft.notes,
        oninput: (e) => draft.notes = e.target.value
      })
    ));

    root.appendChild(body);

    const foot = el("div", { class: "sheet-foot" });
    if (editing) {
      foot.appendChild(el("button", { class: "btn danger", onclick: () => {
        alertSheet({ title: "Delete Cost", body: "Remove this cost entry? This can't be undone.", buttons: [{ label: "Delete Cost", variant: "danger", action: () => {
          state.spending = state.spending.filter(s => s.id !== editing.id);
          dbDelete("spending", editing.id);
          saveState();
          closeSheet();
          rerender();
          toast("Cost deleted");
        }}]});
      } }, "Delete"));
    }
    foot.appendChild(el("button", { class: "btn ghost", onclick: closeSheet }, "Cancel"));
    foot.appendChild(el("button", { class: "btn primary", onclick: () => {
      const amount = parseFloat(draft.amount);
      if (isNaN(amount) || amount <= 0) return toast("Enter a valid amount");
      if (!draft.date) return toast("Pick a date");
      const final = { ...draft, amount };
      if (editing) {
        state.spending = state.spending.map(s => s.id === editing.id ? final : s);
      } else {
        state.spending.push(final);
      }
      saveState();
      closeSheet();
      rerender();
      toast(editing ? "Cost updated" : "Cost added");
    } }, editing ? "Save" : "Add cost"));
    root.appendChild(foot);

    return root;
  });
}

    ));

      }, isPinSet() ? "🔒 Change / Remove PIN" : "🔒 Set PIN Lock")
    ));

    foot.appendChild(el("button", { class: "btn ghost", onclick: closeSheet }, "Cancel"));

      const normalized = draft.username.toLowerCase().replace(/[^a-z0-9_]/g, "");
      if (normalized && normalized !== state.profile.username && _currentUser) {
        const { data } = await supabase
          .from("profiles").select("id")
          .eq("username", normalized)
          .neq("id", _currentUser.id)
          .limit(1);

   ---------------------------------------------------------------- */
function openDaySheet(iso) {
  const dayPayouts = state.payouts.filter(p => p.date === iso);
  const journalEntry = journalForDate(iso);
  const isToday = iso === today();
  const isPast = iso < today();

  openSheet(() => {
    const root = document.createElement("div");
    root.appendChild(sheetHead(fmtDateLong(iso)));
    const body = el("div", { class: "sheet-body" });

    // ---- Quick-add payout button at the top ----
    body.appendChild(el("button", {
      class: "btn primary",
      style: "width:100%;margin-bottom:18px;",
      onclick: () => {
        closeSheet();
        setTimeout(() => openPayoutSheet(null, { date: iso }), 200);
      }
    }, "+ Add Payout for This Day"));

    // ---- Payouts for this day ----
    if (dayPayouts.length) {
      body.appendChild(el("div", { class: "field-label", style: "margin-bottom:8px;" }, `Payouts (${dayPayouts.length})`));
      const list = el("div", { class: "timeline", style: "margin-bottom:18px;" });
      dayPayouts.forEach(p => list.appendChild(payoutItem(p)));
      body.appendChild(list);
    }

    // ---- Journal / daily note ----
    body.appendChild(el("div", { class: "journal-wrap" },
      el("div", { class: "journal-label" },
        "Daily Note",
        journalEntry ? el("span", { class: "journal-dot" }) : null
      ),
      (() => {
        const ta = el("textarea", {
          class: "journal-textarea",
          placeholder: isToday
            ? "What happened today? Passed eval, got reset, market notes…"
            : isPast
            ? "Add a note about this day…"
            : "Notes for this upcoming date…"
        });
        ta.value = journalEntry ? journalEntry.text : "";

        let journalTimer = null;
        ta.addEventListener("input", () => {
          clearTimeout(journalTimer);
          journalTimer = setTimeout(() => {
            saveJournalEntry(iso, ta.value);
          }, 800); // auto-save after 800ms pause
        });

        return ta;
      })(),
      el("div", { style: "font-size:11px;color:var(--text-4);margin-top:6px;" }, "Auto-saves as you type")
    ));

    root.appendChild(body);

    const foot = el("div", { class: "sheet-foot" });
    foot.appendChild(el("button", { class: "btn ghost", onclick: closeSheet }, "Done"));
    root.appendChild(foot);

    return root;
  });
}

let toastTimer = null;
function toast(msg) {
  const t = document.getElementById("toast");
  t.innerHTML = `<span class="check">✓</span>${msg}`;
  t.classList.add("visible");
  if (toastTimer) clearTimeout(toastTimer);
